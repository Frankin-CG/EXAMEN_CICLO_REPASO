<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Literatura - Academia Sofía</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #9e0570;
            --navy-mid: #68044f;
            --navy-light: #a30889;
            --navy-pale: #e8eef8;
            --navy-ultra: #f4f7fd;
            --gold: #3f0430;
            --gold-light: #e8b84b;
            --gold-pale: #fdf6e3;
            --cream: #fafbff;
            --warm-white: #ffffff;
            --text: #0a1a35;
            --text-soft: #4a6080;
            --border: #c5d5ec;
            --border-pale: #dde8f5;
            --correct: #1a6b3a;
            --correct-bg: #e6f5ee;
            --incorrect: #a0230e;
            --incorrect-bg: #fdecea;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #e8eef8 0%, #f4f7fd 50%, #fdf6e3 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: var(--warm-white);
            border-radius: 20px;
            box-shadow: 0 24px 64px rgba(21, 51, 116, 0.18), 0 0 0 1px rgba(15,32,68,0.10);
            max-width: 860px;
            width: 100%;
            overflow: hidden;
            animation: fadeUp 0.6s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .academy-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, #1e4880 100%);
            padding: 32px 40px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .academy-header::before {
            content: '';
            position: absolute;
            top: -40px; left: -40px; right: -40px; bottom: -40px;
            background-image: repeating-linear-gradient(
                45deg, transparent, transparent 28px,
                rgba(201,151,44,0.08) 28px, rgba(201,151,44,0.08) 29px
            );
        }
        .academy-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, transparent, rgba(201,151,44,0.8), transparent);
        }
        .logo-container {
            position: relative;
            width: 100%; max-width: 300px;
            margin: 0 auto 16px;
        }
        .logo-container img { width: 100%; height: auto; max-height: 120px; object-fit: contain; }
        .divider {
            width: 80px; height: 3px;
            background: linear-gradient(90deg, transparent, rgba(201,151,44,0.9), transparent);
            margin: 10px auto 0;
        }

        /* INNER */
        .inner { padding: 36px 44px 40px; background: var(--cream); }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.1em;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .header h1 span { color: var(--navy-light); }
        .header p { color: var(--text-soft); font-size: 1em; font-weight: 600; }

        /* PROGRESS */
        .progress-wrapper { margin-bottom: 28px; }
        .progress-info {
            display: flex; justify-content: space-between;
            font-size: 0.85em; color: var(--text-soft);
            font-weight: 700; margin-bottom: 8px;
        }
        .progress-bar {
            width: 100%; height: 10px;
            background: var(--navy-pale); border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--navy), var(--gold));
            width: 0%; transition: width 0.4s ease; border-radius: 10px;
        }

        /* QUESTION */
        .question-card { display: none; animation: slideIn 0.35s ease; }
        .question-card.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .question-number {
            display: inline-block;
            background: var(--navy-pale);
            color: var(--navy-mid);
            font-weight: 700; font-size: 0.82em;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 50px; margin-bottom: 14px;
            border: 1.5px solid var(--border);
        }
        .question-text {
            font-size: 1.18em; color: var(--text);
            margin-bottom: 22px; line-height: 1.65; font-weight: 600;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 16px 22px;
            border: 2px solid var(--border-pale);
            border-radius: 12px; cursor: pointer;
            transition: all 0.25s ease;
            font-size: 1.04em; background: var(--warm-white);
            color: var(--text);
            display: flex; align-items: center; gap: 12px;
        }
        .option-letter {
            width: 30px; height: 30px; min-width: 30px;
            border-radius: 50%;
            background: var(--navy-ultra);
            border: 2px solid var(--border);
            color: var(--navy-mid);
            font-weight: 800; font-size: 0.85em;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s ease;
        }
        .option:hover {
            border-color: var(--gold);
            background: var(--gold-pale);
            transform: translateX(6px);
            box-shadow: 0 4px 16px rgba(201,151,44,0.15);
        }
        .option:hover .option-letter {
            background: var(--gold); color: white; border-color: var(--gold);
        }
        .option.selected { border-color: var(--navy-light); background: var(--navy-pale); }
        .option.correct { border-color: var(--correct); background: var(--correct-bg); }
        .option.correct .option-letter { background: var(--correct); color: white; border-color: var(--correct); }
        .option.incorrect { border-color: var(--incorrect); background: var(--incorrect-bg); }
        .option.incorrect .option-letter { background: var(--incorrect); color: white; border-color: var(--incorrect); }
        .option.disabled { cursor: not-allowed; }
        .option.disabled:hover { transform: none; box-shadow: none; background: var(--warm-white); border-color: var(--border-pale); }
        .option.disabled:hover .option-letter { background: var(--navy-ultra); color: var(--navy-mid); border-color: var(--border); }
        .option.correct.disabled:hover, .option.correct.disabled { border-color: var(--correct); background: var(--correct-bg); }
        .option.correct.disabled:hover .option-letter { background: var(--correct); color: white; border-color: var(--correct); }
        .option.incorrect.disabled:hover, .option.incorrect.disabled { border-color: var(--incorrect); background: var(--incorrect-bg); }
        .option.incorrect.disabled:hover .option-letter { background: var(--incorrect); color: white; border-color: var(--incorrect); }

        /* JUSTIFICATION */
        .justification {
            display: none;
            margin-top: 20px; padding: 18px 22px;
            background: linear-gradient(to right, var(--gold-pale), #fffdf5);
            border-left: 4px solid var(--gold);
            border-radius: 10px;
            animation: fadeUp 0.4s ease;
            font-size: 1em; color: var(--text-soft); line-height: 1.6;
        }
        .justification.show { display: block; }
        .justification strong { color: var(--navy-mid); }

        /* NAV */
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; gap: 14px; }
        .btn {
            padding: 14px 32px; border: none; border-radius: 10px;
            font-size: 1em; cursor: pointer;
            transition: all 0.25s ease; font-weight: 700;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: white;
            box-shadow: 0 4px 16px rgba(15,32,68,0.28);
            border: 2px solid transparent;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(15,32,68,0.38);
            background: linear-gradient(135deg, var(--navy-light), var(--gold));
        }
        .btn-secondary {
            background: var(--warm-white); color: var(--text-soft); border: 2px solid var(--border-pale);
        }
        .btn-secondary:hover {
            background: var(--navy-pale); border-color: var(--navy-light); color: var(--navy);
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* RESULTS */
        .results { display: none; text-align: center; }
        .results.show { display: block; }
        .results h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2em; color: var(--text); margin-bottom: 8px;
        }
        .score-circle {
            width: 200px; height: 200px; border-radius: 50%;
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            border: 5px solid var(--navy-pale);
            color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            margin: 28px auto 14px;
            box-shadow: 0 12px 40px rgba(15,32,68,0.30), 0 0 0 10px rgba(15,32,68,0.07);
        }
        .nota-label { font-size: 0.82em; opacity: 0.85; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; color: rgba(255,255,255,0.85); }
        .nota-valor { font-family: 'Cormorant Garamond', serif; font-size: 4em; font-weight: 800; line-height: 1; color: white; }
        .nota-total { font-size: 1em; opacity: 0.75; color: rgba(201,210,230,0.9); }
        .score-detail {
            display: inline-block; background: var(--warm-white);
            border: 2px solid var(--border-pale); border-radius: 12px;
            padding: 10px 28px; margin-bottom: 20px;
            font-size: 1em; color: var(--text-soft);
        }
        .score-detail span { font-weight: 800; color: var(--navy-mid); }
        .grade-bar-container { width: 100%; max-width: 480px; margin: 0 auto 20px; }
        .grade-bar-bg { width: 100%; height: 16px; background: var(--navy-pale); border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
        .grade-bar-fill { height: 100%; border-radius: 10px; transition: width 1s ease; background: linear-gradient(90deg, var(--navy), var(--gold)); }
        .grade-bar-labels { display: flex; justify-content: space-between; font-size: 0.78em; color: #aaa; padding: 0 2px; }
        .grade-badge {
            display: inline-block; padding: 8px 24px; border-radius: 50px;
            font-weight: 800; font-size: 1em; margin-bottom: 16px; letter-spacing: 0.5px;
        }
        .badge-excelente   { background: #e6f7ee; color: #1a7a4a; border: 2px solid #2ecc71; }
        .badge-bueno       { background: #e8f4fd; color: #1565c0; border: 2px solid #3498db; }
        .badge-regular     { background: #fef9e7; color: #b7770d; border: 2px solid #f1c40f; }
        .badge-desaprobado { background: #fdecea; color: #c0392b; border: 2px solid #e74c3c; }
        .results p.result-msg {
            font-size: 1.1em; color: var(--text-soft); margin-bottom: 24px;
            line-height: 1.7; max-width: 500px; margin-left: auto; margin-right: auto;
        }
        .results-motto {
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: white;
            padding: 14px 32px; border-radius: 50px;
            font-weight: 800; font-size: 1.05em;
            display: inline-block; margin-top: 8px;
            letter-spacing: 1.5px; text-transform: uppercase;
            box-shadow: 0 4px 16px rgba(15,32,68,0.28);
            border: 2px solid rgba(201,151,44,0.4);
        }

        @media (max-width: 600px) {
            .inner { padding: 24px 20px; }
            .academy-header { padding: 24px 20px; }
            .header h1 { font-size: 1.6em; }
            .question-text { font-size: 1.05em; }
            .nav-buttons { flex-direction: column; }
            .score-circle { width: 160px; height: 160px; }
            .nota-valor { font-size: 3.2em; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="academy-header">
        <div class="logo-container">
            <img src="logo_SOFIA-Photoroom.png" alt="Logo Academia Sofía">
        </div>
        <div class="divider"></div>
    </div>

    <div class="inner">
        <div class="header">
            <h1>📚 Examen de <span>Literatura</span></h1>
            <p>Ciclo Repaso · 26 Preguntas</p>
        </div>

        <div class="progress-wrapper">
            <div class="progress-info">
                <span id="progressText">Pregunta 1 de 26</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="quizContainer"></div>

        <div class="results" id="results">
            <h2>🎉 ¡Examen Completado!</h2>
            <div class="score-circle">
                <div class="nota-label">Tu nota</div>
                <div class="nota-valor" id="finalNota">0</div>
                <div class="nota-total">/ 20</div>
            </div>
            <div class="score-detail">
                Respuestas correctas: <span id="finalScore">0</span> de <span id="totalQuestions">26</span>
            </div>
            <div class="grade-bar-container">
                <div class="grade-bar-bg">
                    <div class="grade-bar-fill" id="gradeBarFill" style="width:0%"></div>
                </div>
                <div class="grade-bar-labels"><span>0</span><span>5</span><span>10</span><span>15</span><span>20</span></div>
            </div>
            <div id="gradeBadge" class="grade-badge"></div>
            <p class="result-msg" id="resultMessage"></p>
            <div class="results-motto">— Tutor Franklin —</div>
            <br><br>
            <button class="btn btn-primary" onclick="restartQuiz()">🔄 Reintentar Examen</button>
        </div>

        <div class="nav-buttons" id="navButtons">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">← Anterior</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
        </div>
    </div>
</div>

<script>
const questions = [
    {
        question: "Querrán volarlo y no podrán volarlo / Querrán romperlo y no podrán romperlo / Querrán matarlo y no podrán matarlo — <em>Canto coral a Túpac Amaru</em>. ¿Qué especie lírica se evidencia en los versos anteriores?",
        options: ["Elegía", "Oda", "Égloga", "Madrigal"],
        correct: 1,
        justification: "Los versos exaltan heroicamente a Túpac Amaru con fervor y grandiosidad, lo cual es característico de la <strong>Oda</strong>, especie lírica que exalta personas, hechos o valores con entusiasmo y elevación."
    },
    {
        question: "«Aguedita, Nativa, Miguel? / Llamo, busco al tanteo en la oscuridad. / No me vayan a haber dejado solo, / y el único recluso sea yo...» — <em>III, poemario Trilce</em>. ¿Cuál es la intención comunicativa del poeta César Vallejo?",
        options: [
            "La soledad que deja el abandono amoroso.",
            "Exalta a los que nos abandonaron.",
            "El sufrimiento y soledad que causa la muerte.",
            "El egocentrismo al exaltar el yo."
        ],
        correct: 2,
        justification: "Vallejo llama a sus hermanos fallecidos desde la oscuridad, expresando el <strong>dolor y la soledad que provoca la muerte</strong> de los seres queridos. La oscuridad y la búsqueda infructuosa refuerzan el sentimiento de pérdida irreparable."
    },
    {
        question: "«A ver. Aquello sea sin ser más. / A ver. No trascienda hacia afuera.» ¿Qué figura literaria se evidencia?",
        options: ["Sinestesia", "Elipsis", "Anáfora", "Animismo"],
        correct: 2,
        justification: "La repetición de la expresión «A ver» al inicio de cada verso es una <strong>Anáfora</strong>: figura literaria que consiste en repetir una o varias palabras al comienzo de versos u oraciones consecutivas para producir énfasis o musicalidad."
    },
    {
        question: "Los relatos clásicos sobre Medusa tienen que ver con su muerte a manos del héroe y semidiós Perseo. Cuenta el mito que el rey de Sérifos, Polidectes, le encargó a Perseo la tarea de matar a la criatura y llevarle su cabeza cercenada. ¿Qué especie narrativa se evidencia?",
        options: ["Leyenda", "Fábula", "Cuento", "Mito"],
        correct: 3,
        justification: "Se trata de un <strong>Mito</strong>: narración de origen anónimo y popular que explica, a través de seres sobrenaturales y héroes, el origen del mundo o de fenómenos naturales y culturales. La participación de semidioses y criaturas mitológicas confirma esta clasificación."
    },
    {
        question: "«La llama que latía en su pecho se apagó». ¿Qué figura literaria se evidencia en el verso anterior?",
        options: ["Anáfora", "Hipérbole", "Metáfora", "Hipérbaton"],
        correct: 2,
        justification: "Es una <strong>Metáfora</strong>: se compara la vida o la pasión del personaje con una llama que se apaga, sin usar conectores comparativos. La metáfora sustituye directamente un concepto por otro con el que guarda una relación de semejanza."
    },
    {
        question: "Disciplina literaria que se encarga de analizar e interpretar la obra literaria dando juicios coherentes.",
        options: ["Historia literaria", "Crítica literaria", "Teoría literaria", "La verosimilitud"],
        correct: 1,
        justification: "La <strong>Crítica literaria</strong> es la disciplina que analiza, interpreta y emite juicios valorativos sobre las obras literarias, a diferencia de la Historia literaria (que estudia la evolución de la literatura en el tiempo) y la Teoría literaria (que establece los principios generales del fenómeno literario)."
    },
    {
        question: "«Nuestras vidas son los ríos / que van a dar en el mar / que es el morir: / allí van los señoríos / derechos a se acabar». ¿Qué especie lírica se evidencia?",
        options: ["Elegía", "Madrigal", "Epístola", "Oda"],
        correct: 0,
        justification: "Estos versos de Jorge Manrique (Coplas a la muerte de su padre) expresan lamento por la muerte y el paso del tiempo, características propias de la <strong>Elegía</strong>: composición lírica que expresa dolor por la muerte de alguien o por una pérdida irreparable."
    },
    {
        question: "«Del salón en el ángulo obscuro, / de su dueño tal vez olvidada, / silenciosa y cubierta de polvo / veíase el arpa.» ¿Qué figura literaria se evidencia?",
        options: ["Hipérbole", "Hipérbaton", "Sinestesia", "Anáfora"],
        correct: 1,
        justification: "El orden sintáctico natural está alterado: lo correcto sería «El arpa se veía en el ángulo oscuro del salón...». Esta inversión deliberada del orden de los elementos es el <strong>Hipérbaton</strong>, figura de construcción muy frecuente en la poesía romántica española."
    },
    {
        question: "MONTESCO: No la sé ni puedo indagarla. / BENVOLIO: ¿No has podido arrancarle ninguna explicación? / MONTESCO: Ni yo, ni nadie. No sé si piensa bien o mal, pero él es el único consejero de sí mismo. ¿Qué género literario se evidencia en el ejemplo anterior?",
        options: ["Épico", "Dramático", "Lírico", "Narrativo"],
        correct: 1,
        justification: "El <strong>género Dramático</strong> se caracteriza por estar escrito en forma de diálogo entre personajes, destinado a la representación escénica. La forma dialogada entre Montesco y Benvolio (de Romeo y Julieta, de Shakespeare) es su rasgo definitorio."
    },
    {
        question: "La literatura parte de la realidad, de las experiencias del poeta, de las manifestaciones históricas y culturales. Sin embargo, posee una naturaleza llamada la ___.",
        options: ["Narración", "Creación", "Verosimilitud", "Racionalidad"],
        correct: 2,
        justification: "La <strong>verosimilitud</strong> es la propiedad de la literatura de parecer real o creíble aunque sea ficción. Aunque la obra literaria surge de la realidad, se transforma en un mundo propio que debe resultar coherente y creíble para el lector."
    },
    {
        question: "El profesor de Literatura, en su clase sobre el Medievalismo, menciona a los estudiantes: «De todos los pecados existentes en la juventud, es el más grave e imperdonable desde los tiempos más memorables». ¿A qué pecado se refiere el profesor?",
        options: ["Herejía", "Violencia", "Lujuria", "Traición"],
        correct: 3,
        justification: "En el Medievalismo, la <strong>traición</strong> era considerada el peor pecado. Esto se refleja claramente en la <em>Divina Comedia</em> de Dante, donde los traidores ocupan el noveno y último círculo del Infierno (el más profundo y terrible)."
    },
    {
        question: "En la epopeya <em>Odisea</em>, Ulises recorrió distintos países, vivió tantos males y penurias, enfrentó a enemigos y conoció muchos dioses. ¿A qué parte de la epopeya hace referencia?",
        options: ["La telemaquía", "La venganza", "Asesinato de los dioses", "Las peripecias de Ulises"],
        correct: 3,
        justification: "Lo descrito corresponde a <strong>las peripecias de Ulises</strong>: la parte central de la Odisea que narra las aventuras, sufrimientos y encuentros del héroe durante su largo viaje de regreso a Ítaca tras la guerra de Troya."
    },
    {
        question: "En la epopeya alegórica <em>Divina Comedia</em>, Dante observó a seres y hombres como: gorgonas, minotauro, centauros, héroes griegos y latinos. ¿A qué mundo dantesco hace referencia la descripción?",
        options: ["Infierno", "Purgatorio", "Paraíso", "Paraíso Terrenal"],
        correct: 0,
        justification: "Los seres monstruosos (gorgonas, minotauro, centauros) y los héroes paganos greco-latinos habitan el <strong>Infierno</strong> en la obra de Dante. El Purgatorio y el Paraíso están poblados por almas purificadas y seres celestiales, respectivamente."
    },
    {
        question: "Movimiento universal que tiene rasgos humanísticos y el predominio de la razón. Se le considera como el modelo de los demás movimientos literarios.",
        options: ["Renacimiento", "Medievalismo", "Clasicismo", "Escolasticismo"],
        correct: 2,
        justification: "El <strong>Clasicismo</strong> grecolatino es considerado el modelo universal de la literatura por su equilibrio, armonía, racionalidad y humanismo. Los escritores del Renacimiento y siglos posteriores tomaron la literatura clásica griega y latina como referente supremo."
    },
    {
        question: "En la novela <em>La familia de Pascual Duarte</em>, el protagonista es quien narra su historia desde la infancia que no era precisamente buenos recuerdos que tuvo, hasta el momento en que comete matricidio. Estos episodios tienen una connotación:",
        options: ["Dramática", "Subliminal", "Irónica", "Romántica"],
        correct: 0,
        justification: "Los episodios violentos y trágicos de la vida de Pascual Duarte, culminando en el matricidio (asesinato de la madre), tienen una clara connotación <strong>dramática</strong>. La novela de Camilo José Cela es el ejemplo más representativo del tremendismo español."
    },
    {

let currentQuestion = 0;
let score = 0;
let answered = false;
const userAnswers = [];

function initQuiz() { renderQuestion(); updateProgress(); updateButtons(); }

function renderQuestion() {
    const q = questions[currentQuestion];
    const container = document.getElementById('quizContainer');
    const letters = ['A', 'B', 'C', 'D', 'E'];
    container.innerHTML = `
        <div class="question-card active">
            <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
            <div class="question-text">${q.question}</div>
            <div class="options">
                ${q.options.map((option, index) => `
                    <div class="option" onclick="selectOption(${index})" data-index="${index}">
                        <span class="option-letter">${letters[index]}</span>
                        <span>${option}</span>
                    </div>
                `).join('')}
            </div>
            <div class="justification" id="justification">
                <strong>💡 Justificación:</strong> ${q.justification}
            </div>
        </div>
    `;
    if (userAnswers[currentQuestion] !== undefined) showPreviousAnswer();
}

function selectOption(index) {
    if (answered) return;
    const options = document.querySelectorAll('.option');
    options.forEach(opt => opt.classList.remove('selected'));
    options[index].classList.add('selected');
    answered = true;
    userAnswers[currentQuestion] = index;
    const q = questions[currentQuestion];
    setTimeout(() => {
        if (index === q.correct) { options[index].classList.add('correct'); score++; }
        else { options[index].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
        options.forEach(opt => opt.classList.add('disabled'));
        document.getElementById('justification').classList.add('show');
        updateButtons();
    }, 300);
}

function showPreviousAnswer() {
    const options = document.querySelectorAll('.option');
    const userAnswer = userAnswers[currentQuestion];
    const q = questions[currentQuestion];
    options[userAnswer].classList.add('selected');
    if (userAnswer === q.correct) options[userAnswer].classList.add('correct');
    else { options[userAnswer].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
    options.forEach(opt => opt.classList.add('disabled'));
    document.getElementById('justification').classList.add('show');
    answered = true;
}

function nextQuestion() {
    if (!answered && userAnswers[currentQuestion] === undefined) {
        alert('Por favor, selecciona una respuesta antes de continuar.');
        return;
    }
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        answered = userAnswers[currentQuestion] !== undefined;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    } else { showResults(); }
}

function previousQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        answered = true;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    }
}

function updateButtons() {
    document.getElementById('prevBtn').disabled = currentQuestion === 0;
    document.getElementById('nextBtn').textContent = (currentQuestion === questions.length - 1)
        ? (answered ? 'Ver Resultados 🎯' : 'Finalizar 🎯')
        : 'Siguiente →';
}

function updateProgress() {
    const pct = Math.round(((currentQuestion + 1) / questions.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
    document.getElementById('progressPct').textContent = pct + '%';
}

function showResults() {
    document.getElementById('quizContainer').style.display = 'none';
    document.getElementById('navButtons').style.display = 'none';
    document.getElementById('results').classList.add('show');
    const total = questions.length;
    const nota = Math.round((score / total) * 20);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('totalQuestions').textContent = total;
    document.getElementById('finalNota').textContent = nota;
    setTimeout(() => {
        document.getElementById('gradeBarFill').style.width = ((nota / 20) * 100) + '%';
    }, 200);
    const badge = document.getElementById('gradeBadge');
    const msg = document.getElementById('resultMessage');
    if (nota >= 17) {
        badge.textContent = '🏆 Sobresaliente'; badge.className = 'grade-badge badge-excelente';
        msg.textContent = '¡Excelente desempeño! Dominas con solidez los temas de Literatura. ¡Así se llega a la universidad! 🌟';
    } else if (nota >= 14) {
        badge.textContent = '👏 Aprobado — Bueno'; badge.className = 'grade-badge badge-bueno';
        msg.textContent = '¡Muy bien! Tienes buenos conocimientos de Literatura. Refuerza los temas donde fallaste y estarás listo para el examen de admisión. 📚';
    } else if (nota >= 11) {
        badge.textContent = '📖 Aprobado — Regular'; badge.className = 'grade-badge badge-regular';
        msg.textContent = 'Vas por buen camino, pero aún hay temas que necesitan más repaso. ¡Tú puedes mejorar, sigue adelante! ✏️';
    } else {
        badge.textContent = '💪 Desaprobado — Sigue intentando'; badge.className = 'grade-badge badge-desaprobado';
        msg.textContent = 'No te rindas. Cada error es una lección. Repasa los temas con calma, vuelve a intentarlo y verás cómo mejoras. ¡Ánimo! 🔥';
    }
}

function restartQuiz() {
    currentQuestion = 0; score = 0; answered = false; userAnswers.length = 0;
    document.getElementById('gradeBarFill').style.width = '0%';
    document.getElementById('quizContainer').style.display = 'block';
    document.getElementById('navButtons').style.display = 'flex';
    document.getElementById('results').classList.remove('show');
    initQuiz();
}

initQuiz();
</script>
