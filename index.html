<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Geografía - Academia Sofía</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0d1b3e;
            --navy-mid: #162447;
            --navy-light: #1f3a6e;
            --gold: #c9a84c;
            --gold-light: #e8c96a;
            --gold-pale: #fdf6e3;
            --cream: #faf8f2;
            --text: #1a1a2e;
            --text-soft: #4a4a6a;
            --correct: #1a7a4a;
            --correct-bg: #e6f7ee;
            --incorrect: #c0392b;
            --incorrect-bg: #fdecea;
            --border: #d4c5a9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--navy);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(31,58,110,0.8) 0%, transparent 60%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: var(--cream);
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.3);
            max-width: 860px;
            width: 100%;
            overflow: hidden;
            animation: fadeUp 0.6s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .academy-header {
            background: var(--navy);
            background-image: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            padding: 32px 40px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .academy-header::before {
            content: '';
            position: absolute;
            top: -40px; left: -40px; right: -40px; bottom: -40px;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 30px,
                rgba(201,168,76,0.04) 30px,
                rgba(201,168,76,0.04) 31px
            );
        }
        .academy-header .logo-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            margin: 0 auto 16px;
        }
        .academy-header .logo-container img {
            width: 100%; height: auto; max-height: 120px; object-fit: contain;
        }
        .gold-divider {
            width: 80px; height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 10px auto 0;
        }

        /* INNER CONTENT */
        .inner {
            padding: 36px 44px 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9em;
            color: var(--navy);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .header h1 span { color: var(--gold); }
        .header p {
            color: var(--text-soft);
            font-size: 1em;
            font-weight: 600;
        }

        /* PROGRESS */
        .progress-wrapper { margin-bottom: 28px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.85em; color: var(--text-soft); font-weight: 700; margin-bottom: 8px; }
        .progress-bar {
            width: 100%; height: 10px;
            background: #e2ddd4;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--navy-light), var(--gold));
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 10px;
        }

        /* QUESTION CARD */
        .question-card { display: none; animation: slideIn 0.35s ease; }
        .question-card.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .question-number {
            display: inline-block;
            background: var(--navy);
            color: var(--gold-light);
            font-weight: 700;
            font-size: 0.82em;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 50px;
            margin-bottom: 14px;
        }
        .question-text {
            font-size: 1.2em;
            color: var(--text);
            margin-bottom: 22px;
            line-height: 1.65;
            font-weight: 600;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 16px 22px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 1.05em;
            background: white;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option-letter {
            width: 30px; height: 30px; min-width: 30px;
            border-radius: 50%;
            background: var(--gold-pale);
            border: 2px solid var(--gold);
            color: var(--navy);
            font-weight: 800;
            font-size: 0.85em;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s ease;
        }
        .option:hover {
            border-color: var(--navy-light);
            background: #f0f4ff;
            transform: translateX(6px);
            box-shadow: 0 4px 16px rgba(13,27,62,0.1);
        }
        .option:hover .option-letter {
            background: var(--navy);
            color: var(--gold-light);
            border-color: var(--navy);
        }
        .option.selected { border-color: var(--navy-light); background: #eef1fb; }
        .option.correct {
            border-color: var(--correct);
            background: var(--correct-bg);
        }
        .option.correct .option-letter { background: var(--correct); color: white; border-color: var(--correct); }
        .option.incorrect {
            border-color: var(--incorrect);
            background: var(--incorrect-bg);
        }
        .option.incorrect .option-letter { background: var(--incorrect); color: white; border-color: var(--incorrect); }
        .option.disabled { cursor: not-allowed; }
        .option.disabled:hover { transform: none; box-shadow: none; }

        /* JUSTIFICATION */
        .justification {
            display: none;
            margin-top: 20px;
            padding: 18px 22px;
            background: linear-gradient(to right, #f0f4ff, #fdf6e3);
            border-left: 4px solid var(--navy-light);
            border-radius: 10px;
            animation: fadeUp 0.4s ease;
            font-size: 1em;
            color: var(--text-soft);
            line-height: 1.6;
        }
        .justification.show { display: block; }
        .justification strong { color: var(--navy); }

        /* NAV BUTTONS */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 14px;
        }
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: var(--gold-light);
            box-shadow: 0 4px 16px rgba(13,27,62,0.3);
            border: 2px solid transparent;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(13,27,62,0.4);
            background: linear-gradient(135deg, var(--navy-light), var(--gold));
            color: white;
        }
        .btn-secondary {
            background: white;
            color: var(--text-soft);
            border: 2px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--gold-pale);
            border-color: var(--gold);
            color: var(--navy);
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* RESULTS */
        .results { display: none; text-align: center; }
        .results.show { display: block; }
        .results h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9em;
            color: var(--navy);
            margin-bottom: 8px;
        }
        .score-circle {
            width: 200px; height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            border: 5px solid var(--gold);
            color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            margin: 28px auto 14px;
            box-shadow: 0 12px 40px rgba(13,27,62,0.4), 0 0 0 10px rgba(201,168,76,0.1);
        }
        .nota-label { font-size: 0.82em; opacity: 0.75; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; color: var(--gold-light); }
        .nota-valor { font-family: 'Playfair Display', serif; font-size: 4em; font-weight: 900; line-height: 1; color: var(--gold-light); }
        .nota-total { font-size: 1em; opacity: 0.7; }
        .score-detail {
            display: inline-block;
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 10px 28px;
            margin-bottom: 20px;
            font-size: 1em;
            color: var(--text-soft);
        }
        .score-detail span { font-weight: 800; color: var(--navy); }
        .grade-bar-container { width: 100%; max-width: 480px; margin: 0 auto 20px; }
        .grade-bar-bg { width: 100%; height: 16px; background: #e2ddd4; border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
        .grade-bar-fill { height: 100%; border-radius: 10px; transition: width 1s ease; background: linear-gradient(90deg, var(--navy-light), var(--gold)); }
        .grade-bar-labels { display: flex; justify-content: space-between; font-size: 0.78em; color: #aaa; padding: 0 2px; }
        .grade-badge {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1em;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }
        .badge-excelente   { background: #e6f7ee; color: #1a7a4a; border: 2px solid #2ecc71; }
        .badge-bueno       { background: #e8f4fd; color: #1565c0; border: 2px solid #3498db; }
        .badge-regular     { background: #fef9e7; color: #b7770d; border: 2px solid #f1c40f; }
        .badge-desaprobado { background: #fdecea; color: #c0392b; border: 2px solid #e74c3c; }
        .results p.result-msg { font-size: 1.1em; color: var(--text-soft); margin-bottom: 24px; line-height: 1.7; max-width: 500px; margin-left: auto; margin-right: auto; }
        .results-motto {
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: var(--gold-light);
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.05em;
            display: inline-block;
            margin-top: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 2px solid rgba(201,168,76,0.4);
        }

        @media (max-width: 600px) {
            .inner { padding: 24px 20px; }
            .academy-header { padding: 24px 20px; }
            .header h1 { font-size: 1.5em; }
            .question-text { font-size: 1.05em; }
            .nav-buttons { flex-direction: column; }
            .score-circle { width: 160px; height: 160px; }
            .nota-valor { font-size: 3.2em; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="academy-header">
        <div class="logo-container">
            <img src="logo_SOFIA-Photoroom.png" alt="Logo Academia Sofía">
        </div>
        <div class="gold-divider"></div>
    </div>

    <div class="inner">
        <div class="header">
            <h1>🌍 Examen de <span>Geografía</span></h1>
            <p>Ciclo Repaso · 34 Preguntas</p>
        </div>

        <div class="progress-wrapper">
            <div class="progress-info">
                <span id="progressText">Pregunta 1 de 34</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="quizContainer"></div>

        <div class="results" id="results">
            <h2>🎉 ¡Examen Completado!</h2>
            <div class="score-circle">
                <div class="nota-label">Tu nota</div>
                <div class="nota-valor" id="finalNota">0</div>
                <div class="nota-total">/ 20</div>
            </div>
            <div class="score-detail">
                Respuestas correctas: <span id="finalScore">0</span> de <span id="totalQuestions">34</span>
            </div>
            <div class="grade-bar-container">
                <div class="grade-bar-bg">
                    <div class="grade-bar-fill" id="gradeBarFill" style="width:0%"></div>
                </div>
                <div class="grade-bar-labels"><span>0</span><span>5</span><span>10</span><span>15</span><span>20</span></div>
            </div>
            <div id="gradeBadge" class="grade-badge"></div>
            <p class="result-msg" id="resultMessage"></p>
            <div class="results-motto">— Tutor Franklin —</div>
            <br><br>
            <button class="btn btn-primary" onclick="restartQuiz()">🔄 Reintentar Examen</button>
        </div>

        <div class="nav-buttons" id="navButtons">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">← Anterior</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
        </div>
    </div>
</div>

<script>
const questions = [
    {
        question: "Son cuerpos opacos que no tienen luz propia, acompañan a las estrellas girando a su alrededor. ¿A qué nos referimos?",
        options: ["Estrellas", "Galaxias", "Satélites", "Planetas", "Cometas"],
        correct: 3,
        justification: "Los planetas son cuerpos celestes opacos que no generan luz propia y giran alrededor de una estrella (como el Sol). Las estrellas sí tienen luz propia, las galaxias son conjuntos de estrellas, los satélites giran alrededor de planetas y los cometas son cuerpos helados con órbitas excéntricas."
    },
    {
        question: "Acerca del planeta Venus, señale lo incorrecto.",
        options: ["No posee satélites naturales.", "Posee la montaña más alta del Sistema Solar.", "Es llamado Lucero de la Mañana.", "Su día demora más que su año.", "Es el más cercano a la Tierra."],
        correct: 1,
        justification: "La afirmación incorrecta es la B, ya que la montaña más alta del Sistema Solar es el monte Olimpo en Marte (unos 22 km de altura). Venus no tiene esa característica."
    },
    {
        question: "La Gran Mancha Roja de ______ es una tormenta mayor que el diámetro de la Tierra. Dura desde hace 300 años y provoca vientos de 400 km/h.",
        options: ["Neptuno", "Urano", "Marte", "Júpiter", "Saturno"],
        correct: 3,
        justification: "La Gran Mancha Roja es una gigantesca tormenta en Júpiter, observada desde hace siglos y con vientos de hasta 400 km/h."
    },
    {
        question: "¿Cómo se denomina la capa más externa del sol, visible durante los eclipses?",
        options: ["Corona", "Núcleo", "Cromósfera", "Fotósfera", "Zona de radiación"],
        correct: 0,
        justification: "La corona solar es la capa más externa del Sol y se observa durante los eclipses totales como un halo brillante."
    },
    {
        question: "El planeta Mercurio tiene el ______ periodo orbital del Sistema Solar.",
        options: ["Mayor", "Anterior", "Igual", "Menor", "Posterior"],
        correct: 3,
        justification: "Mercurio es el planeta más cercano al Sol, por lo que tiene el período orbital más corto (88 días terrestres)."
    },
    {
        question: "Acerca del Sistema Solar, marca lo incorrecto.",
        options: ["Dos estrellas", "Ocho planetas y sus satélites", "Planetas enanos", "Asteroides", "Cometas, polvo y gas interplanetario"],
        correct: 0,
        justification: "El Sistema Solar tiene una sola estrella, el Sol. La opción A es incorrecta."
    },
    {
        question: "Es el séptimo planeta desde el Sol y el tercero más grande del Sistema Solar.",
        options: ["Urano", "Tierra", "Júpiter", "Neptuno", "Saturno"],
        correct: 0,
        justification: "Urano es el séptimo planeta desde el Sol y el tercero en tamaño, después de Júpiter y Saturno."
    },
    {
        question: "El/la ______ contiene más del 99% de toda la masa del Sistema Solar.",
        options: ["Luna", "Sol", "Núcleo de Júpiter", "Anillo de Saturno", "Espacio entre la Tierra y Marte"],
        correct: 1,
        justification: "El Sol contiene aproximadamente el 99.86% de la masa total del Sistema Solar."
    },
    {
        question: "Los romanos le pusieron el nombre del mensajero de los dioses, porque se movía más rápido que los demás planetas.",
        options: ["Venus", "Júpiter", "Marte", "Mercurio", "Saturno"],
        correct: 3,
        justification: "Mercurio era el dios mensajero en la mitología romana, y el planeta recibió ese nombre por su rápido movimiento orbital."
    },
    {
        question: "Son grandes fragmentos de roca, entre las órbitas de Marte y Júpiter. Uno de ellos probablemente puso fin a la era de los dinosaurios, cuando impactó contra la Tierra.",
        options: ["Galaxias", "Asteroides", "Estrellas", "Planetas", "Agujeros negros"],
        correct: 1,
        justification: "El cinturón de asteroides se encuentra entre Marte y Júpiter. Se cree que un asteroide impactó la Tierra y causó la extinción de los dinosaurios."
    },
    {
        question: "Es un planeta que no tiene océanos y su densa atmósfera provoca un efecto invernadero que eleva la temperatura hasta los 480 °C.",
        options: ["Mercurio", "Tierra", "Marte", "Venus", "Júpiter"],
        correct: 3,
        justification: "Venus tiene una atmósfera densa de CO₂ que genera un intenso efecto invernadero, con temperaturas superficiales de hasta 480 °C."
    },
    {
        question: "El satélite con mayor actividad volcánica del Sistema Solar es:",
        options: ["Selene", "Fobos", "Io", "Titán", "Europa"],
        correct: 2,
        justification: "Ío, una luna de Júpiter, es el cuerpo con mayor actividad volcánica del Sistema Solar debido a la intensa interacción gravitacional con Júpiter."
    },
    {
        question: "La era espacial comenzó en 1957, cuando se lanzó el primer satélite denominado:",
        options: ["Voyager I", "Vostok I", "Apolo 11", "Sputnik", "Skylab"],
        correct: 3,
        justification: "El Sputnik 1, lanzado por la Unión Soviética en 1957, fue el primer satélite artificial en orbitar la Tierra, marcando el inicio de la era espacial."
    },
    {
        question: "Es la constelación zodiacal que se puede observar entre el 22 de junio al 22 de julio.",
        options: ["Acuario", "Géminis", "Aries", "Cáncer", "Leo"],
        correct: 3,
        justification: "Según la astrología tropical, el signo zodiacal de Cáncer abarca aproximadamente del 22 de junio al 22 de julio."
    },
    {
        question: "Las estrellas que tienen una masa similar a la del sol terminan al final de su ciclo de vida como:",
        options: ["Agujeros negros", "Estrellas de neutrones", "Pulsares", "Enanas blancas", "Cefeidas"],
        correct: 3,
        justification: "Estrellas como el Sol, al agotar su combustible nuclear, se convierten en enanas blancas tras expulsar sus capas exteriores como nebulosa planetaria."
    },
    {
        question: "La estrella más próxima al sol es:",
        options: ["Sirio", "Aldebarán", "Antares", "Betelgeuse", "Próxima Centauri"],
        correct: 4,
        justification: "Próxima Centauri es una estrella enana roja que forma parte del sistema Alfa Centauri y está a unos 4.22 años luz de distancia, siendo la más cercana al Sol."
    },
    {
        question: "El movimiento de rotación de la Vía Láctea fue descubierto en 1924 por:",
        options: ["Hendrik Oort", "Edwin Hubble", "George Gamow", "Alexander Friedman", "Stephen Alexander"],
        correct: 0,
        justification: "El astrónomo neerlandés Jan Hendrik Oort demostró en 1924 que la Vía Láctea rota, basándose en estudios de movimientos estelares."
    },
    {
        question: "Las galaxias que predominan en los cúmulos de galaxias son:",
        options: ["Elípticas", "Espirales", "Irregulares", "Cuadráticas", "Ninguna de las anteriores"],
        correct: 0,
        justification: "En los cúmulos de galaxias predominan las galaxias elípticas porque, debido a la alta densidad de galaxias en estas regiones, ocurren frecuentes fusiones y colisiones entre ellas. Estos eventos destruyen las formas espirales originales y dan origen a galaxias más grandes y masivas de forma elíptica."
    },
    {
        question: "Es el conjunto de estrellas, gases y polvo cósmico.",
        options: ["Constelaciones", "Universos", "Galaxias", "Sistemas planetarios", "Figuras estelares"],
        correct: 2,
        justification: "Una galaxia es un sistema masivo de estrellas, gas interestelar, polvo y materia oscura, unidos por la gravedad."
    },
    {
        question: "Son características del Universo, excepto:",
        options: ["Isótropo", "Está en expansión", "Evolutivo", "Iluminado", "Silencioso"],
        correct: 3,
        justification: "Isótropo significa que una propiedad es igual en todas las direcciones. No es una característica que describa al universo en general (a gran escala el universo es homogéneo e isótropo, pero en este contexto es la opción que no corresponde como característica destacada). Las demás opciones sí son propiedades reconocidas del cosmos."
    },
    {
        question: "El término 'universos-islas' fue acuñado por ______ para referirse a las galaxias.",
        options: ["Boris Chumbile", "Stephen Hawking", "Edwin Hubble", "Emanuel Kant", "Pierre Simon de Laplace"],
        correct: 3,
        justification: "El filósofo Immanuel Kant usó el término 'universos-isla' para referirse a las galaxias, anticipando que eran sistemas estelares independientes fuera de la Vía Láctea."
    },
    {
        question: "El movimiento de recesión de las galaxias fue descubierto en 1929 por:",
        options: ["Ruben Piuranus", "Edwin Hubble", "George Gamow", "Alexander Friedman", "Stephen Alexander"],
        correct: 1,
        justification: "Edwin Hubble descubrió que las galaxias se alejan de nosotros, formulando la ley de Hubble, base de la expansión del universo."
    },
    {
        question: "La teoría que sostiene que el universo no tuvo principio y no tendrá un final es:",
        options: ["Gran estallido", "Big Bang", "Cíclico", "Estacionaria", "Pulsante"],
        correct: 3,
        justification: "La teoría del estado estacionario propone un universo sin principio ni fin, en expansión pero con densidad constante, aunque hoy es menos aceptada que el Big Bang."
    },
    {
        question: "Las galaxias que en su interior poseen estrellas rojas, serán consideradas:",
        options: ["Jóvenes", "Infantes", "Viejas", "Adolescentes", "Nacientes"],
        correct: 2,
        justification: "Las estrellas rojas suelen ser de tipo espectral tardío (enanas rojas o gigantes rojas), indicando poblaciones estelares viejas. Las galaxias con muchas estrellas rojas tienden a ser más antiguas."
    },
    {

        options: ["Seudónimo de la fauna", "Apodo de la flora", "Nociones climáticas", "Nombres y significados de los lugares", "Datos de los productos límite"],

        justification: "La toponimia es el estudio del origen y significado de los nombres propios de los lugares (topónimos)."

    {

        options: ["Chala", "Omagua", "Puna", "Quechua", "Rupa Rupa"],
        correct: 1,
        justification: "La quina (Cinchona officinalis) es un árbol típico de la región Yunga, utilizado por sus propiedades medicinales contra la malaria."

        options: ["Suni", "Puna", "Chala", "Yunga", "Quechua"],

        correct: 2,

        correct: 3,
        justification: "La clasificación de Pulgar Vidal se basa en pisos altitudinales, es decir, regiones determinadas por la altura sobre el nivel del mar."

let currentQuestion = 0;
let score = 0;
let answered = false;
const userAnswers = [];

function initQuiz() { renderQuestion(); updateProgress(); updateButtons(); }

function renderQuestion() {
    const q = questions[currentQuestion];
    const container = document.getElementById('quizContainer');
    const letters = ['A', 'B', 'C', 'D', 'E'];
    container.innerHTML = `
        <div class="question-card active">
            <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
            <div class="question-text">${q.question}</div>
            <div class="options">
                ${q.options.map((option, index) => `
                    <div class="option" onclick="selectOption(${index})" data-index="${index}">
                        <span class="option-letter">${letters[index]}</span>
                        <span>${option}</span>
                    </div>
                `).join('')}
            </div>
            <div class="justification" id="justification">
                <strong>📖 Justificación:</strong> ${q.justification}
            </div>
        </div>
    `;
    if (userAnswers[currentQuestion] !== undefined) showPreviousAnswer();
}

function selectOption(index) {
    if (answered) return;
    const options = document.querySelectorAll('.option');
    options.forEach(opt => opt.classList.remove('selected'));
    options[index].classList.add('selected');
    answered = true;
    userAnswers[currentQuestion] = index;
    const q = questions[currentQuestion];
    setTimeout(() => {
        if (index === q.correct) { options[index].classList.add('correct'); score++; }
        else { options[index].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
        options.forEach(opt => opt.classList.add('disabled'));
        document.getElementById('justification').classList.add('show');
        updateButtons();
    }, 300);
}

function showPreviousAnswer() {
    const options = document.querySelectorAll('.option');
    const userAnswer = userAnswers[currentQuestion];
    const q = questions[currentQuestion];
    options[userAnswer].classList.add('selected');
    if (userAnswer === q.correct) options[userAnswer].classList.add('correct');
    else { options[userAnswer].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
    options.forEach(opt => opt.classList.add('disabled'));
    document.getElementById('justification').classList.add('show');
    answered = true;
}

function nextQuestion() {
    if (!answered && userAnswers[currentQuestion] === undefined) { alert('Por favor, selecciona una respuesta antes de continuar.'); return; }
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        answered = userAnswers[currentQuestion] !== undefined;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    } else { showResults(); }
}

function previousQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        answered = true;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    }
}

function updateButtons() {
    document.getElementById('prevBtn').disabled = currentQuestion === 0;
    document.getElementById('nextBtn').textContent = (currentQuestion === questions.length - 1)
        ? (answered ? 'Ver Resultados 🎯' : 'Finalizar 🎯')
        : 'Siguiente →';
}

function updateProgress() {
    const pct = Math.round(((currentQuestion + 1) / questions.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
    document.getElementById('progressPct').textContent = pct + '%';
}

function showResults() {
    document.getElementById('quizContainer').style.display = 'none';
    document.getElementById('navButtons').style.display = 'none';
    document.getElementById('results').classList.add('show');
    const total = questions.length;
    const nota = Math.round((score / total) * 20 * 10) / 10;
    const notaDisplay = Number.isInteger(nota) ? nota : nota.toFixed(1);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('totalQuestions').textContent = total;
    document.getElementById('finalNota').textContent = notaDisplay;
    setTimeout(() => { document.getElementById('gradeBarFill').style.width = ((nota / 20) * 100) + '%'; }, 200);
    const badge = document.getElementById('gradeBadge');
    const msg = document.getElementById('resultMessage');
    if (nota >= 17) {
        badge.textContent = '🏆 Sobresaliente'; badge.className = 'grade-badge badge-excelente';
        msg.textContent = '¡Excelente desempeño! Dominas con solidez los temas de Geografía. ¡Así se llega a la universidad! 🌟';
    } else if (nota >= 14) {
        badge.textContent = '👏 Aprobado — Bueno'; badge.className = 'grade-badge badge-bueno';
        msg.textContent = '¡Muy bien! Tienes buenos conocimientos. Refuerza los temas donde fallaste y estarás listo para el examen de admisión. 📚';
    } else if (nota >= 11) {
        badge.textContent = '📖 Aprobado — Regular'; badge.className = 'grade-badge badge-regular';
        msg.textContent = 'Vas por buen camino, pero aún hay temas que necesitan más repaso. ¡Tú puedes mejorar, sigue adelante! ✏️';
    } else {
        badge.textContent = '💪 Desaprobado — Sigue intentando'; badge.className = 'grade-badge badge-desaprobado';
        msg.textContent = 'No te rindas. Cada error es una lección. Repasa los temas con calma, vuelve a intentarlo y verás cómo mejoras. ¡Ánimo! 🔥';
    }
}

function restartQuiz() {
    currentQuestion = 0; score = 0; answered = false; userAnswers.length = 0;
    document.getElementById('gradeBarFill').style.width = '0%';
    document.getElementById('quizContainer').style.display = 'block';
    document.getElementById('navButtons').style.display = 'flex';
    document.getElementById('results').classList.remove('show');
    initQuiz();
}

initQuiz();
</script>
