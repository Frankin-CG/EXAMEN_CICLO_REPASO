<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Historia Universal - Academia_Sofía</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 50%, #ffa502 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 850px;
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0);}
        }

        .academy-header {
            background: linear-gradient(135deg, #ff4757, #ff6348, #ffa502);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        .logo-container {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: contain;
            display: block;
        }

        .logo-text {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #ff4757, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .academy-name {
            color: white;
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .academy-motto {
            color: #fff;
            font-size: 1.2em;
            font-style: italic;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff6348, #ffa502);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-card {
            display: none;
            animation: slideIn 0.4s ease;
        }

        .question-card.active {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .question-number {
            color: #ff4757;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            padding: 18px 25px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            background: white;
        }

        .option:hover {
            border-color: #ff6348;
            background: linear-gradient(to right, #fff5f5, #fffaf0);
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #ff6348;
            background: linear-gradient(to right, #ffe5e5, #fff5e5);
        }

        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .option.incorrect {
            border-color: #f44336;
            background: #ffebee;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .justification {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(to right, #fff5f5, #fffaf0);
            border-left: 4px solid #ff6348;
            border-radius: 8px;
            animation: fadeIn 0.4s ease;
        }

        .justification.show {
            display: block;
        }

        .justification strong {
            color: #ff4757;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff4757, #ffa502);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            display: none;
            text-align: center;
        }

        .results.show {
            display: block;
        }

        .score-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4757, #ff6348, #ffa502);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 30px auto;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.4);
        }

        .score-circle .score {
            font-size: 3.5em;
            font-weight: bold;
        }

        .score-circle .total {
            font-size: 1.3em;
            opacity: 0.9;
        }

        .results p {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 30px;
        }

        .results-motto {
            background: linear-gradient(135deg, #ff4757, #ffa502);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1em;
            display: inline-block;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .container { padding: 25px; }
            .logo-container { max-width: 200px; }
            .logo-container img { max-height: 100px; }
            .academy-name { font-size: 1.4em; }
            .academy-motto { font-size: 0.9em; }
            .header h1 { font-size: 1.8em; }
            .question-text { font-size: 1.1em; }
            .nav-buttons { flex-direction: column; }
            .score-circle { width: 180px; height: 180px; }
            .score-circle .score { font-size: 2.8em; }
            .results-motto { font-size: 0.9em; padding: 12px 20px; }
        }

        @media (max-width: 400px) {
            .container { padding: 20px; }
            .logo-container { max-width: 150px; }
            .logo-container img { max-height: 80px; }
            .academy-motto { font-size: 0.8em; }
            .option { padding: 15px 20px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="academy-header">
            <div class="logo-container">
                <img src="logo_SOFIA-Photoroom.png" alt="Logo Academia">
            </div>
        </div>

        <div class="header">
            <h1>🏛️ Examen de Historia Universal</h1>
            <p>Ciclo repaso - 36 Preguntas</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="quizContainer"></div>

        <div class="results" id="results">
            <h2>🎉 ¡Examen Completado!</h2>
            <div class="score-circle">
                <div class="score" id="finalScore">0</div>
                <div class="total">/ 36</div>
            </div>
            <p id="resultMessage"></p>
            <div class="results-motto">--Tutor Franklin--</div>
            <br><br>
            <button class="btn btn-primary" onclick="restartQuiz()">🔄 Reintentar Examen</button>
        </div>

        <div class="nav-buttons" id="navButtons">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">← Anterior</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
        </div>
    </div>

    <script>
        const questions = [
            // I. REFORMA Y CONTRARREFORMA
            {
                question: "¿Quién inició la Reforma Protestante en 1517?",
                options: ["Juan Calvino", "Enrique VIII", "Martín Lutero", "Ignacio de Loyola"],
                correct: 2,
                justification: "En 1517, Martín Lutero publicó las 95 tesis en Wittenberg, criticando la venta de indulgencias y los abusos de la Iglesia Católica. Este hecho marcó el inicio de la Reforma Protestante."
            },
            {
                question: "¿Qué orden religiosa fue fundamental en la Contrarreforma?",
                options: ["Franciscanos", "Dominicos", "Benedictinos", "Jesuitas"],
                correct: 3,
                justification: "La Compañía de Jesús, fundada por Ignacio de Loyola en 1540, fue clave para defender el catolicismo mediante la educación, las misiones y la lucha contra el protestantismo."
            },
            {
                question: "¿Cuántos sacramentos reafirmó la Iglesia Católica en el Concilio de Trento?",
                options: ["3", "5", "6", "7"],
                correct: 3,
                justification: "El Concilio de Trento (1545–1563) reafirmó los siete sacramentos frente a las críticas del protestantismo, que solo reconocía dos."
            },
            {
                question: "¿Qué rey defendió el catolicismo en España durante la Contrarreforma?",
                options: ["Carlos I", "Felipe II", "Fernando II", "Alfonso X"],
                correct: 1,
                justification: "Felipe II fue un férreo defensor del catolicismo. Combatió el protestantismo, apoyó la Inquisición y fue pilar de la Contrarreforma en Europa."
            },
            // II. ABSOLUTISMO Y DESPOTISMO ILUSTRADO
            {
                question: "¿Qué rey de Prusia fue representante del Despotismo Ilustrado?",
                options: ["Luis XIV", "Carlos III", "Federico II el Grande", "Pedro el Grande"],
                correct: 2,
                justification: "Federico II el Grande aplicó reformas inspiradas en la Ilustración, modernizando la administración, el ejército y la educación del Estado prusiano."
            },
            {
                question: "¿Qué rey español es el máximo representante del Despotismo Ilustrado?",
                options: ["Felipe V", "Carlos III", "Fernando VI", "Carlos IV"],
                correct: 1,
                justification: "Carlos III impulsó profundas reformas económicas, administrativas y educativas bajo el lema ilustrado: 'Todo para el pueblo, pero sin el pueblo'."
            },
            {
                question: "¿Qué defendía el filósofo John Locke?",
                options: ["El poder absoluto del rey", "Los derechos naturales del individuo", "La soberanía popular total", "La unión de Iglesia y Estado"],
                correct: 1,
                justification: "Locke afirmaba que todos los seres humanos nacen con derechos naturales inalienables que el Estado debe respetar. Esta idea es base del liberalismo político moderno."
            },
            {
                question: "¿Cuáles eran los derechos naturales según John Locke?",
                options: ["Igualdad, fraternidad y libertad", "Vida, libertad y propiedad", "Educación, trabajo y salud", "Religión, cultura y seguridad"],
                correct: 1,
                justification: "Para Locke, los derechos naturales inalienables del ser humano son la vida, la libertad y la propiedad, pilares fundamentales del liberalismo clásico."
            },
            // III. LA ILUSTRACIÓN
            {
                question: "¿Qué obra fue la más representativa de la Ilustración?",
                options: ["El Príncipe", "El Leviatán", "La Enciclopedia", "El Capital"],
                correct: 2,
                justification: "La Enciclopedia recopiló el conocimiento científico, filosófico y técnico del siglo XVIII, convirtiéndose en el símbolo del pensamiento ilustrado."
            },
            {
                question: "¿Quién dirigió la Enciclopedia junto a D'Alembert?",
                options: ["Voltaire", "Rousseau", "Diderot", "Montesquieu"],
                correct: 2,
                justification: "Denis Diderot, junto a Jean le Rond D'Alembert, dirigió la elaboración y publicación de la Enciclopedia entre 1751 y 1772."
            },
            {
                question: "¿Cómo se conoce también al siglo XVIII?",
                options: ["Siglo de las Revoluciones", "Siglo de Oro", "Siglo de las Luces", "Siglo del Progreso"],
                correct: 2,
                justification: "El siglo XVIII se denomina 'Siglo de las Luces' porque predominó la razón, la ciencia y el pensamiento crítico frente al dogma y la superstición."
            },
            {
                question: "¿Qué pensador ilustrado escribió 'El contrato social'?",
                options: ["Voltaire", "Montesquieu", "Rousseau", "Locke"],
                correct: 2,
                justification: "Jean-Jacques Rousseau planteó en 'El contrato social' el principio de soberanía popular: el poder legítimo emana del pueblo."
            },
            {
                question: "¿Qué país destacó también en la Ilustración con pensadores como Locke y Newton?",
                options: ["Francia", "Alemania", "Inglaterra", "Italia"],
                correct: 2,
                justification: "En Inglaterra destacaron John Locke en filosofía política e Isaac Newton en ciencias naturales, siendo referentes clave del pensamiento ilustrado."
            },
            // IV. INDEPENDENCIA DE EE.UU.
            {
                question: "¿Qué rey británico gobernaba durante la independencia de las colonias americanas?",
                options: ["Jorge I", "Jorge II", "Jorge III", "Guillermo IV"],
                correct: 2,
                justification: "Durante el reinado de Jorge III se impusieron impuestos a las colonias americanas sin representación, lo que provocó la rebelión y finalmente la independencia."
            },
            {
                question: "¿Qué batalla fue decisiva para asegurar la victoria estadounidense?",
                options: ["Saratoga", "Lexington", "Yorktown", "Bunker Hill"],
                correct: 2,
                justification: "En 1781, las fuerzas británicas se rindieron ante George Washington en Yorktown, asegurando la independencia de los Estados Unidos de América."
            },
            {
                question: "¿Cuáles eran los tres estamentos del Antiguo Régimen?",
                options: ["Rey, nobleza y clero", "Clero, nobleza y tercer estado", "Aristocracia, burguesía y campesinado", "Iglesia, ejército y pueblo"],
                correct: 1,
                justification: "La sociedad del Antiguo Régimen estaba dividida en tres estamentos: el clero (primer estado), la nobleza (segundo estado) y el tercer estado (burguesía, artesanos y campesinos)."
            },
            // V. REVOLUCIÓN FRANCESA
            {
                question: "¿Qué asamblea proclamó la Primera República Francesa en 1792?",
                options: ["Asamblea Nacional", "Convención Nacional", "Estados Generales", "Directorio"],
                correct: 1,
                justification: "La Convención Nacional abolió la monarquía y proclamó la Primera República Francesa en septiembre de 1792, tras la caída de Luis XVI."
            },
            {
                question: "¿Qué periodo de la Revolución Francesa terminó con la caída de Robespierre?",
                options: ["La Constituyente", "El Terror", "El Directorio", "El Consulado"],
                correct: 1,
                justification: "La caída y ejecución de Maximilien Robespierre en julio de 1794 (Termidor) puso fin al Régimen del Terror, caracterizado por miles de ejecuciones políticas."
            },
            {
                question: "¿Qué grupo político representaba posiciones más moderadas durante la Revolución Francesa?",
                options: ["Jacobinos", "Girondinos", "Montañeses", "Sans-culottes"],
                correct: 1,
                justification: "Los girondinos eran el sector moderado de la Convención, que buscaba reformas sin violencia extrema, en oposición a los radicales jacobinos."
            },
            {
                question: "¿Qué grupo defendía los privilegios del rey durante la Revolución Francesa?",
                options: ["Jacobinos", "Realistas", "Girondinos", "Termidorianos"],
                correct: 1,
                justification: "Los realistas o monárquicos defendían la institución de la monarquía y los privilegios del rey, oponiéndose a los cambios revolucionarios."
            },
            // VI. ERA NAPOLEÓNICA
            {
                question: "¿En qué año comenzó la Era Napoleónica?",
                options: ["1789", "1795", "1799", "1804"],
                correct: 2,
                justification: "La Era Napoleónica comienza en 1799 con el Golpe de Estado del 18 de Brumario, mediante el cual Napoleón Bonaparte disolvió el Directorio y tomó el poder."
            },
            {
                question: "¿Qué hecho marcó el inicio del poder personal de Napoleón?",
                options: ["La batalla de Austerlitz", "El Golpe del 18 de Brumario", "La coronación como Emperador", "El Tratado de Amiens"],
                correct: 1,
                justification: "El Golpe del 18 de Brumario (9 de noviembre de 1799) fue el golpe de Estado con el que Napoleón disolvió el Directorio y estableció el Consulado, concentrando el poder en sus manos."
            },
            {
                question: "¿A qué isla fue enviado Napoleón en su primer exilio en 1814?",
                options: ["Santa Elena", "Córcega", "Elba", "Cerdeña"],
                correct: 2,
                justification: "Tras su primera abdicación en 1814, Napoleón fue exiliado a la isla de Elba. Escapó en 1815 y volvió al poder durante los Cien Días, hasta su derrota definitiva en Waterloo."
            },
            {
                question: "¿Qué buscaba el Congreso de Viena (1814–1815)?",
                options: ["Expandir el liberalismo en Europa", "Restaurar las monarquías y el orden conservador", "Crear una república europea", "Repartir las colonias americanas"],
                correct: 1,
                justification: "El Congreso de Viena buscaba restaurar el orden monárquico y el equilibrio político en Europa tras las guerras napoleónicas, frenando el avance del liberalismo y el nacionalismo."
            },
            {
                question: "¿Qué periodo histórico se conoce como la Restauración?",
                options: ["El retorno de Napoleón al poder", "La reorganización conservadora de Europa tras Napoleón", "La reconstrucción de Francia tras la guerra", "El restablecimiento de la República Francesa"],
                correct: 1,
                justification: "La Restauración es el periodo (1815–1830) en que se reestablecieron las monarquías absolutas en Europa y se intentó volver al orden previo a la Revolución Francesa."
            },
            {
                question: "¿En qué ciudad y país se realizó el Congreso de Viena?",
                options: ["Berlín, Prusia", "París, Francia", "Viena, Austria", "Londres, Inglaterra"],
                correct: 2,
                justification: "El congreso se celebró en Viena, capital del Imperio Austriaco, entre 1814 y 1815, siendo el escenario del nuevo orden europeo posnapoleónico."
            },
            {
                question: "¿Quién fue el principal organizador del Congreso de Viena?",
                options: ["Talleyrand", "Metternich", "Castlereagh", "Alejandro I"],
                correct: 1,
                justification: "El canciller austriaco Klemens von Metternich fue el gran arquitecto del Congreso de Viena y el principal defensor del principio de restauración y equilibrio europeo."
            },
            {
                question: "¿Qué dinastía fue restaurada en Francia tras la caída de Napoleón?",
                options: ["Habsburgo", "Borbones", "Valois", "Orleans"],
                correct: 1,
                justification: "Se restauró la monarquía francesa con Luis XVIII, perteneciente a la dinastía Borbón, la misma familia de Luis XVI, guillotinado durante la Revolución."
            },
            {
                question: "¿Qué países integraron la Santa Alianza creada en 1815?",
                options: ["Francia, Inglaterra y Austria", "Rusia, Austria y Prusia", "España, Portugal y Austria", "Prusia, Francia y Rusia"],
                correct: 1,
                justification: "La Santa Alianza fue firmada por Rusia, Austria y Prusia para defender los principios del absolutismo monárquico y sofocar cualquier movimiento liberal o revolucionario en Europa."
            },
            // VII. REVOLUCIONES DEL SIGLO XIX Y REVOLUCIÓN INDUSTRIAL
            {
                question: "¿Qué país logró su independencia en 1830 separándose del Reino de los Países Bajos?",
                options: ["Grecia", "Polonia", "Bélgica", "Hungría"],
                correct: 2,
                justification: "Bélgica se independizó del Reino de los Países Bajos en 1830 tras una revolución inspirada en los ideales liberales y nacionalistas de la época."
            },
            {
                question: "¿Cómo se conoce al conjunto de revoluciones liberales y nacionalistas que sacudieron Europa en 1848?",
                options: ["Primavera de los Pueblos", "Revolución de las Naciones", "Otoño de las Monarquías", "La Gran Insurrección"],
                correct: 0,
                justification: "Las revoluciones de 1848 se conocen como la 'Primavera de los Pueblos' por su carácter simultáneo en varios países europeos y sus ideales de libertad, constitución y unidad nacional."
            },
            {
                question: "¿Qué movimiento ideológico estuvo estrechamente ligado al liberalismo en el siglo XIX?",
                options: ["Nacionalismo", "Socialismo", "Anarquismo", "Conservadurismo"],
                correct: 0,
                justification: "El nacionalismo y el liberalismo se desarrollaron juntos en el siglo XIX, ambos buscando libertades políticas y la autodeterminación de los pueblos frente al absolutismo."
            },
            {
                question: "¿En qué siglo se inició la Revolución Industrial?",
                options: ["Siglo XVI", "Siglo XVII", "Siglo XIX", "Siglo XVIII"],
                correct: 3,
                justification: "La Revolución Industrial comenzó alrededor de 1760 en Inglaterra, en el siglo XVIII, transformando radicalmente los métodos de producción y la organización social."
            },
            {
                question: "¿Qué industria fue la primera en industrializarse durante la Revolución Industrial?",
                options: ["Siderúrgica", "Textil", "Minera", "Alimentaria"],
                correct: 1,
                justification: "La industria textil fue la primera en mecanizarse, con inventos como la lanzadera volante, la hiladora Spinning Jenny y el telar mecánico, que multiplicaron la producción."
            },
            {
                question: "¿Quién perfeccionó la máquina de vapor, clave en la Revolución Industrial?",
                options: ["Thomas Edison", "James Watt", "George Stephenson", "Robert Fulton"],
                correct: 1,
                justification: "James Watt mejoró significativamente la eficiencia de la máquina de vapor en 1769, convirtiéndola en la fuente de energía que impulsó fábricas, trenes y barcos durante la Revolución Industrial."
            },
            {
                question: "¿Quién inventó el teléfono en 1876?",
                options: ["Thomas Edison", "Graham Bell", "Nikola Tesla", "Guglielmo Marconi"],
                correct: 1,
                justification: "Alexander Graham Bell patentó el teléfono en 1876, uno de los inventos más trascendentales de la Segunda Revolución Industrial, que transformó las comunicaciones a nivel mundial."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        const userAnswers = [];

        function initQuiz() {
            renderQuestion();
            updateProgress();
            updateButtons();
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            const container = document.getElementById('quizContainer');
            
            container.innerHTML = `
                <div class="question-card active">
                    <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${q.options.map((option, index) => `
                            <div class="option" onclick="selectOption(${index})" data-index="${index}">
                                <strong>${String.fromCharCode(65 + index)})</strong> ${option}
                            </div>
                        `).join('')}
                    </div>
                    <div class="justification" id="justification">
                        <strong>📜 Justificación:</strong> ${q.justification}
                    </div>
                </div>
            `;

            if (userAnswers[currentQuestion] !== undefined) {
                showPreviousAnswer();
            }
        }

        function selectOption(index) {
            if (answered) return;

            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            options[index].classList.add('selected');

            answered = true;
            userAnswers[currentQuestion] = index;

            const q = questions[currentQuestion];
            
            setTimeout(() => {
                if (index === q.correct) {
                    options[index].classList.add('correct');
                    score++;
                } else {
                    options[index].classList.add('incorrect');
                    options[q.correct].classList.add('correct');
                }

                options.forEach(opt => opt.classList.add('disabled'));
                document.getElementById('justification').classList.add('show');
                
                updateButtons();
            }, 300);
        }

        function showPreviousAnswer() {
            const options = document.querySelectorAll('.option');
            const userAnswer = userAnswers[currentQuestion];
            const q = questions[currentQuestion];

            options[userAnswer].classList.add('selected');
            
            if (userAnswer === q.correct) {
                options[userAnswer].classList.add('correct');
            } else {
                options[userAnswer].classList.add('incorrect');
                options[q.correct].classList.add('correct');
            }

            options.forEach(opt => opt.classList.add('disabled'));
            document.getElementById('justification').classList.add('show');
            answered = true;
        }

        function nextQuestion() {
            if (!answered && userAnswers[currentQuestion] === undefined) {
                alert('Por favor, selecciona una respuesta antes de continuar.');
                return;
            }

            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                answered = userAnswers[currentQuestion] !== undefined;
                renderQuestion();
                updateProgress();
                updateButtons();
                window.scrollTo(0, 0);
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                answered = true;
                renderQuestion();
                updateProgress();
                updateButtons();
                window.scrollTo(0, 0);
            }
        }

        function updateButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            prevBtn.disabled = currentQuestion === 0;

            if (currentQuestion === questions.length - 1) {
                nextBtn.textContent = answered ? 'Ver Resultados 🎯' : 'Finalizar Quiz 🎯';
            } else {
                nextBtn.textContent = 'Siguiente →';
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('results').classList.add('show');
            document.getElementById('finalScore').textContent = score;

            const percentage = (score / questions.length) * 100;
            let message = '';

            if (percentage >= 90) {
                message = '¡Excelente! 🌟 Tienes un dominio sobresaliente de Historia Universal.';
            } else if (percentage >= 70) {
                message = '¡Muy bien! 👏 Tienes buenos conocimientos de Historia Universal.';
            } else if (percentage >= 50) {
                message = '¡Buen intento! 📖 Sigue estudiando para mejorar.';
            } else {
                message = '¡Ánimo! 💪 Repasa los temas y vuelve a intentarlo.';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            answered = false;
            userAnswers.length = 0;

            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('navButtons').style.display = 'flex';
            document.getElementById('results').classList.remove('show');

            initQuiz();
        }

        initQuiz();
    </script>
</body>
</html>
