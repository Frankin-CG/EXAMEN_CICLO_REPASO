<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Biología - Academia_Sofía</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 50%, #ffa502 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 850px;
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0);}
        }

        .academy-header {
            background: linear-gradient(135deg, #ff4757, #ff6348, #ffa502);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        .logo-container {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            max-height: 200px; /* increased from 120px */
            object-fit: contain;
            display: block;
        }

        .logo-text {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #ff4757, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .academy-name {
            color: white;
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .academy-motto {
            color: #fff;
            font-size: 1.2em;
            font-style: italic;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff6348, #ffa502);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-card {
            display: none;
            animation: slideIn 0.4s ease;
        }

        .question-card.active {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .question-number {
            color: #ff4757;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            padding: 18px 25px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            background: white;
        }

        .option:hover {
            border-color: #ff6348;
            background: linear-gradient(to right, #fff5f5, #fffaf0);
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #ff6348;
            background: linear-gradient(to right, #ffe5e5, #fff5e5);
        }

        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .option.incorrect {
            border-color: #f44336;
            background: #ffebee;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .justification {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(to right, #fff5f5, #fffaf0);
            border-left: 4px solid #ff6348;
            border-radius: 8px;
            animation: fadeIn 0.4s ease;
        }

        .justification.show {
            display: block;
        }

        .justification strong {
            color: #ff4757;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff4757, #ffa502);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            display: none;
            text-align: center;
        }

        .results.show {
            display: block;
        }

        .score-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4757, #ff6348, #ffa502);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 30px auto;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.4);
        }

        .score-circle .score {
            font-size: 3.5em;
            font-weight: bold;
        }

        .score-circle .total {
            font-size: 1.3em;
            opacity: 0.9;
        }

       

        .results p {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 30px;
        }

        .results-motto {
            background: linear-gradient(135deg, #ff4757, #ffa502);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1em;
            display: inline-block;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .logo-container {
                max-width: 200px; /* allow a bit more space */
            }

            .logo-container img {
                max-height: 100px; /* slightly larger */
            }

            .academy-name {
                font-size: 1.4em;
            }

            .academy-motto {
                font-size: 0.9em;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .question-text {
                font-size: 1.1em;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .score-circle {
                width: 180px;
                height: 180px;
            }

            .score-circle .score {
                font-size: 2.8em;
            }

            .results-motto {
                font-size: 0.9em;
                padding: 12px 20px;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 20px;
            }

            .logo-container {
                max-width: 150px; /* a bit larger */
            }

            .logo-container img {
                max-height: 80px;
            }

            .academy-motto {
                font-size: 0.8em;
            }

            .option {
                padding: 15px 20px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="academy-header">
            <div class="logo-container">
                <img src="logo_SOFIA-Photoroom.png" alt="Logo Academia">
            </div>
        </div>

        <div class="header">
            <h1>🧬Examen de Biología</h1>
            <p>Ciclo repaso - 20 Preguntas</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="quizContainer"></div>

        <div class="results" id="results">
            <h2>🎉 ¡Examen Completado!</h2>
            <div class="score-circle">
                <div class="score" id="finalScore">0</div>
                <div class="total">/ 20</div>
            </div>
            <p id="resultMessage"></p>
            <div class="results-motto">--Tutor Franklin--</div>
            <br><br>
            <button class="btn btn-primary" onclick="restartQuiz()">🔄 Reintentar Examen</button>
        </div>

        <div class="nav-buttons" id="navButtons">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">← Anterior</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "¿Cuál de los siguientes elementos NO es un bioelemento primario?",
                options: ["Carbono (C)", "Hidrógeno (H)", "Calcio (Ca)", "Oxígeno (O)"],
                correct: 2,
                justification: "Los bioelementos primarios son C, H, O, N, P y S que constituyen el 96% de la materia viva. El calcio es un bioelemento secundario importante pero en menor proporción."
            },
            {
                question: "Las proteínas están formadas por la unión de:",
                options: ["Monosacáridos", "Aminoácidos", "Nucleótidos", "Ácidos grasos"],
                correct: 1,
                justification: "Las proteínas son polímeros formados por la unión de aminoácidos mediante enlaces peptídicos. Existen 20 aminoácidos diferentes que forman todas las proteínas."
            },
            {
                question: "¿Qué característica distingue a las células eucariotas de las procariotas?",
                options: ["Presencia de ribosomas", "Núcleo definido con membrana nuclear", "Capacidad de reproducirse", "Presencia de ADN"],
                correct: 1,
                justification: "Las células eucariotas poseen un núcleo verdadero delimitado por membrana nuclear que contiene el material genético, mientras que las procariotas tienen su ADN disperso en el citoplasma."
            },
            {
                question: "¿Qué orgánulo celular es conocido como la 'central energética' de la célula?",
                options: ["Cloroplasto", "Mitocondria", "Núcleo", "Lisosoma"],
                correct: 1,
                justification: "La mitocondria es el orgánulo donde ocurre la respiración celular aeróbica, proceso que produce ATP (adenosín trifosfato), la principal fuente de energía para las funciones celulares."
            },
            {
                question: "En la fotosíntesis, las plantas capturan energía luminosa y producen:",
                options: ["Proteínas y lípidos", "Glucosa y oxígeno", "Agua y dióxido de carbono", "ATP únicamente"],
                correct: 1,
                justification: "Durante la fotosíntesis, las plantas usan luz solar, CO₂ y agua para sintetizar glucosa (alimento) y liberar oxígeno como producto secundario, mediante la ecuación: 6CO₂ + 6H₂O + luz → C₆H₁₂O₆ + 6O₂."
            },
            {
                question: "¿Cuál es la función principal de los carbohidratos en los seres vivos?",
                options: ["Catalizador de reacciones químicas", "Almacenamiento y obtención de energía", "Transmisión de información genética", "Defensa inmunológica"],
                correct: 1,
                justification: "Los carbohidratos (como glucosa, glucógeno y almidón) son la principal fuente de energía inmediata para los organismos y también sirven como reserva energética."
            },
            {
                question: "¿En qué órgano del sistema digestivo se absorbe la mayor parte de los nutrientes?",
                options: ["Estómago", "Intestino delgado", "Colon", "Hígado"],
                correct: 1,
                justification: "El intestino delgado, especialmente el yeyuno, es donde ocurre la mayor absorción de nutrientes gracias a las vellosidades y microvellosidades intestinales que aumentan la superficie de contacto."
            },
            {
                question: "¿Qué tipo de respuesta realizan las plantas cuando crecen hacia la luz?",
                options: ["Geotropismo", "Fototropismo", "Quimiotropismo", "Tigmotropismo"],
                correct: 1,
                justification: "El fototropismo es la respuesta direccional de crecimiento de las plantas hacia la fuente de luz, principalmente en tallos y hojas, mediada por hormonas como las auxinas."
            },
            {
                question: "Los receptores que captan estímulos químicos, como los del gusto y olfato, se llaman:",
                options: ["Mecanorreceptores", "Fotorreceptores", "Quimiorreceptores", "Termorreceptores"],
                correct: 2,
                justification: "Los quimiorreceptores detectan sustancias químicas en el ambiente. Se encuentran en las papilas gustativas de la lengua y en el epitelio olfativo de la nariz."
            },
            {
                question: "¿Qué tipo de movimiento es el latido del corazón?",
                options: ["Voluntario consciente", "Involuntario automático", "Reflejo condicionado", "Movimiento nástico"],
                correct: 1,
                justification: "El latido cardíaco es un movimiento involuntario controlado por el sistema nervioso autónomo y el nodo sinusal (marcapasos natural), que funciona sin control consciente."
            },
            {
                question: "La mitosis es un proceso de división celular que produce:",
                options: ["Cuatro células haploides diferentes", "Dos células diploides idénticas", "Gametos sexuales", "Células con mutaciones"],
                correct: 1,
                justification: "La mitosis produce dos células hijas genéticamente idénticas a la célula madre, conservando el mismo número de cromosomas (diploides en organismos diploides). Es fundamental para crecimiento y reparación."
            },
            {
                question: "¿Cuántas divisiones celulares ocurren durante la meiosis?",
                options: ["Una división", "Dos divisiones consecutivas", "Tres divisiones", "Cuatro divisiones"],
                correct: 1,
                justification: "La meiosis consta de dos divisiones sucesivas (meiosis I y meiosis II) que reducen el número cromosómico a la mitad, produciendo cuatro células haploides (gametos) a partir de una célula diploide."
            },
            {
                question: "¿Qué tipo de reproducción genera mayor variabilidad genética?",
                options: ["Reproducción asexual", "Bipartición", "Reproducción sexual", "Gemación"],
                correct: 2,
                justification: "La reproducción sexual genera mayor variabilidad genética debido a la recombinación cromosómica durante la meiosis y la fusión aleatoria de gametos de diferentes progenitores."
            },
            {
                question: "¿Cuál es el principal desecho nitrogenado eliminado por los riñones humanos?",
                options: ["Ácido úrico", "Amoníaco", "Urea", "Creatinina únicamente"],
                correct: 2,
                justification: "La urea es el principal producto de excreción nitrogenado en humanos, formado en el hígado a partir del amoníaco tóxico generado por el metabolismo de proteínas, y eliminado por los riñones."
            },
            {
                question: "Los lípidos tienen como función principal:",
                options: ["Acelerar reacciones químicas", "Almacenar energía a largo plazo y formar membranas", "Transportar oxígeno", "Almacenar información genética"],
                correct: 1,
                justification: "Los lípidos tienen múltiples funciones: almacenamiento energético a largo plazo (triglicéridos), componente estructural de membranas celulares (fosfolípidos) y función hormonal (esteroides)."
            },
            {
                question: "El material genético de las células eucariotas se encuentra en:",
                options: ["El citoplasma disperso", "El núcleo celular", "Los ribosomas", "Las mitocondrias únicamente"],
                correct: 1,
                justification: "En células eucariotas, el ADN se encuentra organizado en cromosomas dentro del núcleo celular, protegido por la membrana nuclear. También hay pequeñas cantidades de ADN en mitocondrias y cloroplastos."
            },
            {
                question: "Durante la respiración celular aeróbica se requiere:",
                options: ["Oxígeno como aceptor final de electrones", "Ausencia total de oxígeno", "Solo luz solar", "Clorofila necesariamente"],
                correct: 0,
                justification: "La respiración aeróbica requiere oxígeno como aceptor final de electrones en la cadena respiratoria mitocondrial, permitiendo la producción eficiente de ATP (aproximadamente 36-38 moléculas por glucosa)."
            },
            {
                question: "¿Qué estructura celular sintetiza las proteínas?",
                options: ["Aparato de Golgi", "Ribosomas", "Lisosomas", "Centrosoma"],
                correct: 1,
                justification: "Los ribosomas son los orgánulos responsables de la síntesis proteica mediante el proceso de traducción, donde leen el ARN mensajero y ensamblan los aminoácidos en cadenas polipeptídicas."
            },
            {
                question: "¿Qué estructura protege y da soporte a las células vegetales?",
                options: ["Membrana plasmática", "Citoesqueleto", "Pared celular de celulosa", "Cápsula bacteriana"],
                correct: 2,
                justification: "Las células vegetales poseen pared celular compuesta principalmente de celulosa, externa a la membrana plasmática, que proporciona rigidez, soporte estructural y protección contra estrés mecánico."
            },
            {
                question: "La absorción de agua por las raíces ocurre principalmente mediante:",
                options: ["Transporte activo con gasto de ATP", "Ósmosis a través de pelos absorbentes", "Difusión facilitada por proteínas", "Endocitosis celular"],
                correct: 1,
                justification: "El agua ingresa a las células de la raíz principalmente por ósmosis (movimiento de agua desde zonas de menor a mayor concentración de solutos) a través de los pelos absorbentes que aumentan la superficie de absorción."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        const userAnswers = [];

        function initQuiz() {
            renderQuestion();
            updateProgress();
            updateButtons();
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            const container = document.getElementById('quizContainer');
            
            container.innerHTML = `
                <div class="question-card active">
                    <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${q.options.map((option, index) => `
                            <div class="option" onclick="selectOption(${index})" data-index="${index}">
                                <strong>${String.fromCharCode(65 + index)})</strong> ${option}
                            </div>
                        `).join('')}
                    </div>
                    <div class="justification" id="justification">
                        <strong>🔬 Justificación:</strong> ${q.justification}
                    </div>
                </div>
            `;

            if (userAnswers[currentQuestion] !== undefined) {
                showPreviousAnswer();
            }
        }

        function selectOption(index) {
            if (answered) return;

            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            options[index].classList.add('selected');

            answered = true;
            userAnswers[currentQuestion] = index;

            const q = questions[currentQuestion];
            
            setTimeout(() => {
                if (index === q.correct) {
                    options[index].classList.add('correct');
                    score++;
                } else {
                    options[index].classList.add('incorrect');
                    options[q.correct].classList.add('correct');
                }

                options.forEach(opt => opt.classList.add('disabled'));
                document.getElementById('justification').classList.add('show');
                
                updateButtons();
            }, 300);
        }

        function showPreviousAnswer() {
            const options = document.querySelectorAll('.option');
            const userAnswer = userAnswers[currentQuestion];
            const q = questions[currentQuestion];

            options[userAnswer].classList.add('selected');
            
            if (userAnswer === q.correct) {
                options[userAnswer].classList.add('correct');
            } else {
                options[userAnswer].classList.add('incorrect');
                options[q.correct].classList.add('correct');
            }

            options.forEach(opt => opt.classList.add('disabled'));
            document.getElementById('justification').classList.add('show');
            answered = true;
        }

        function nextQuestion() {
            if (!answered && userAnswers[currentQuestion] === undefined) {
                alert('Por favor, selecciona una respuesta antes de continuar.');
                return;
            }

            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                answered = userAnswers[currentQuestion] !== undefined;
                renderQuestion();
                updateProgress();
                updateButtons();
                window.scrollTo(0, 0);
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                answered = true;
                renderQuestion();
                updateProgress();
                updateButtons();
                window.scrollTo(0, 0);
            }
        }

        function updateButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            prevBtn.disabled = currentQuestion === 0;

            if (currentQuestion === questions.length - 1) {
                nextBtn.textContent = answered ? 'Ver Resultados 🎯' : 'Finalizar Quiz 🎯';
            } else {
                nextBtn.textContent = 'Siguiente →';
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('results').classList.add('show');
            document.getElementById('finalScore').textContent = score;

            const percentage = (score / questions.length) * 100;
            let message = '';

            if (percentage >= 90) {
                message = '¡Excelente! 🌟 Tienes un dominio sobresaliente de biología.';
            } else if (percentage >= 70) {
                message = '¡Muy bien! 👏 Tienes buenos conocimientos de biología.';
            } else if (percentage >= 50) {
                message = '¡Buen intento! 📖 Sigue estudiando para mejorar.';
            } else {
                message = '¡Ánimo! 💪 Repasa los temas y vuelve a intentarlo.';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            answered = false;
            userAnswers.length = 0;

            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('navButtons').style.display = 'flex';
            document.getElementById('results').classList.remove('show');

            initQuiz();
        }

        initQuiz();
    </script>
</body>
</html>
