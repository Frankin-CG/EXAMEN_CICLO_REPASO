<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Lenguaje - Academia Sofía</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #c0392b;
            --red-mid: #e74c3c;
            --red-light: #f1948a;
            --red-pale: #fdecea;
            --red-ultra: #fff5f5;
            --rose: #fce8e8;
            --cream: #fff9f9;
            --warm-white: #ffffff;
            --text: #2e0a0a;
            --text-soft: #7a3a3a;
            --border: #f5b8b8;
            --border-pale: #fad4d4;
            --correct: #1a7a4a;
            --correct-bg: #e6f7ee;
            --incorrect: #c0392b;
            --incorrect-bg: #fdecea;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdecea 0%, #fff5f5 40%, #fff0f0 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: var(--warm-white);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(192,57,43,0.15), 0 0 0 1px rgba(192,57,43,0.12);
            max-width: 860px;
            width: 100%;
            overflow: hidden;
            animation: fadeUp 0.6s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .academy-header {
            background: linear-gradient(135deg, var(--red) 0%, var(--red-mid) 60%, #e85d4a 100%);
            padding: 32px 40px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .academy-header::before {
            content: '';
            position: absolute;
            top: -40px; left: -40px; right: -40px; bottom: -40px;
            background-image: repeating-linear-gradient(
                45deg, transparent, transparent 28px,
                rgba(255,255,255,0.06) 28px, rgba(255,255,255,0.06) 29px
            );
        }
        .academy-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255,220,210,0.8), transparent);
        }
        .logo-container {
            position: relative;
            width: 100%; max-width: 300px;
            margin: 0 auto 16px;
        }
        .logo-container img { width: 100%; height: auto; max-height: 120px; object-fit: contain; }
        .divider {
            width: 80px; height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            margin: 10px auto 0;
        }

        /* INNER */
        .inner { padding: 36px 44px 40px; background: var(--cream); }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9em;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .header h1 span { color: var(--red); }
        .header p { color: var(--text-soft); font-size: 1em; font-weight: 600; }

        /* PROGRESS */
        .progress-wrapper { margin-bottom: 28px; }
        .progress-info {
            display: flex; justify-content: space-between;
            font-size: 0.85em; color: var(--text-soft);
            font-weight: 700; margin-bottom: 8px;
        }
        .progress-bar {
            width: 100%; height: 10px;
            background: var(--red-pale); border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--red), var(--red-light));
            width: 0%; transition: width 0.4s ease; border-radius: 10px;
        }

        /* QUESTION */
        .question-card { display: none; animation: slideIn 0.35s ease; }
        .question-card.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .question-number {
            display: inline-block;
            background: var(--red-pale);
            color: var(--red);
            font-weight: 700; font-size: 0.82em;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 50px; margin-bottom: 14px;
            border: 1.5px solid var(--border);
        }
        .question-text {
            font-size: 1.2em; color: var(--text);
            margin-bottom: 22px; line-height: 1.65; font-weight: 600;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 16px 22px;
            border: 2px solid var(--border-pale);
            border-radius: 12px; cursor: pointer;
            transition: all 0.25s ease;
            font-size: 1.05em; background: var(--warm-white);
            color: var(--text);
            display: flex; align-items: center; gap: 12px;
        }
        .option-letter {
            width: 30px; height: 30px; min-width: 30px;
            border-radius: 50%;
            background: var(--red-ultra);
            border: 2px solid var(--border);
            color: var(--red);
            font-weight: 800; font-size: 0.85em;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s ease;
        }
        .option:hover {
            border-color: var(--red-mid);
            background: var(--red-ultra);
            transform: translateX(6px);
            box-shadow: 0 4px 16px rgba(192,57,43,0.12);
        }
        .option:hover .option-letter {
            background: var(--red); color: white; border-color: var(--red);
        }
        .option.selected { border-color: var(--red-mid); background: var(--red-pale); }
        .option.correct { border-color: var(--correct); background: var(--correct-bg); }
        .option.correct .option-letter { background: var(--correct); color: white; border-color: var(--correct); }
        .option.incorrect { border-color: var(--incorrect); background: var(--incorrect-bg); }
        .option.incorrect .option-letter { background: var(--incorrect); color: white; border-color: var(--incorrect); }
        .option.disabled { cursor: not-allowed; }
        .option.disabled:hover { transform: none; box-shadow: none; }

        /* JUSTIFICATION */
        .justification {
            display: none;
            margin-top: 20px; padding: 18px 22px;
            background: linear-gradient(to right, var(--red-ultra), #fff8f8);
            border-left: 4px solid var(--red-mid);
            border-radius: 10px;
            animation: fadeUp 0.4s ease;
            font-size: 1em; color: var(--text-soft); line-height: 1.6;
        }
        .justification.show { display: block; }
        .justification strong { color: var(--red); }

        /* NAV */
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; gap: 14px; }
        .btn {
            padding: 14px 32px; border: none; border-radius: 10px;
            font-size: 1em; cursor: pointer;
            transition: all 0.25s ease; font-weight: 700;
            font-family: 'Nunito', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--red), var(--red-mid));
            color: white;
            box-shadow: 0 4px 16px rgba(192,57,43,0.3);
            border: 2px solid transparent;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(192,57,43,0.4);
            background: linear-gradient(135deg, var(--red-mid), var(--red-light));
        }
        .btn-secondary {
            background: var(--warm-white); color: var(--text-soft); border: 2px solid var(--border-pale);
        }
        .btn-secondary:hover {
            background: var(--red-pale); border-color: var(--red-mid); color: var(--red);
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* RESULTS */
        .results { display: none; text-align: center; }
        .results.show { display: block; }
        .results h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9em; color: var(--text); margin-bottom: 8px;
        }
        .score-circle {
            width: 200px; height: 200px; border-radius: 50%;
            background: linear-gradient(135deg, var(--red), var(--red-mid));
            border: 5px solid var(--rose);
            color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            margin: 28px auto 14px;
            box-shadow: 0 12px 40px rgba(192,57,43,0.3), 0 0 0 10px rgba(192,57,43,0.08);
        }
        .nota-label { font-size: 0.82em; opacity: 0.85; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; color: rgba(255,255,255,0.9); }
        .nota-valor { font-family: 'Playfair Display', serif; font-size: 4em; font-weight: 900; line-height: 1; color: white; }
        .nota-total { font-size: 1em; opacity: 0.75; color: rgba(255,220,215,0.9); }
        .score-detail {
            display: inline-block; background: var(--warm-white);
            border: 2px solid var(--border-pale); border-radius: 12px;
            padding: 10px 28px; margin-bottom: 20px;
            font-size: 1em; color: var(--text-soft);
        }
        .score-detail span { font-weight: 800; color: var(--red); }
        .grade-bar-container { width: 100%; max-width: 480px; margin: 0 auto 20px; }
        .grade-bar-bg { width: 100%; height: 16px; background: var(--red-pale); border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
        .grade-bar-fill { height: 100%; border-radius: 10px; transition: width 1s ease; background: linear-gradient(90deg, var(--red), var(--red-light)); }
        .grade-bar-labels { display: flex; justify-content: space-between; font-size: 0.78em; color: #ccc; padding: 0 2px; }
        .grade-badge {
            display: inline-block; padding: 8px 24px; border-radius: 50px;
            font-weight: 800; font-size: 1em; margin-bottom: 16px; letter-spacing: 0.5px;
        }
        .badge-excelente   { background: #e6f7ee; color: #1a7a4a; border: 2px solid #2ecc71; }
        .badge-bueno       { background: #e8f4fd; color: #1565c0; border: 2px solid #3498db; }
        .badge-regular     { background: #fef9e7; color: #b7770d; border: 2px solid #f1c40f; }
        .badge-desaprobado { background: #fdecea; color: #c0392b; border: 2px solid #e74c3c; }
        .results p.result-msg {
            font-size: 1.1em; color: var(--text-soft); margin-bottom: 24px;
            line-height: 1.7; max-width: 500px; margin-left: auto; margin-right: auto;
        }
        .results-motto {
            background: linear-gradient(135deg, var(--red), var(--red-mid));
            color: white;
            padding: 14px 32px; border-radius: 50px;
            font-weight: 800; font-size: 1.05em;
            display: inline-block; margin-top: 8px;
            letter-spacing: 1.5px; text-transform: uppercase;
            box-shadow: 0 4px 16px rgba(192,57,43,0.3);
            border: 2px solid rgba(255,200,195,0.4);
        }

        @media (max-width: 600px) {
            .inner { padding: 24px 20px; }
            .academy-header { padding: 24px 20px; }
            .header h1 { font-size: 1.5em; }
            .question-text { font-size: 1.05em; }
            .nav-buttons { flex-direction: column; }
            .score-circle { width: 160px; height: 160px; }
            .nota-valor { font-size: 3.2em; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="academy-header">
        <div class="logo-container">
            <img src="logo_SOFIA-Photoroom.png" alt="Logo Academia Sofía">
        </div>
        <div class="divider"></div>
    </div>

    <div class="inner">
        <div class="header">
            <h1>📝 Examen de <span>Lenguaje</span></h1>
            <p>Ciclo Repaso · 35 Preguntas </p>
        </div>

        <div class="progress-wrapper">
            <div class="progress-info">
                <span id="progressText">Pregunta 1 de 35</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="quizContainer"></div>

        <div class="results" id="results">
            <h2>🎉 ¡Examen Completado!</h2>
            <div class="score-circle">
                <div class="nota-label">Tu nota</div>
                <div class="nota-valor" id="finalNota">0</div>
                <div class="nota-total">/ 20</div>
            </div>
            <div class="score-detail">
                Respuestas correctas: <span id="finalScore">0</span> de <span id="totalQuestions">35</span>
            </div>
            <div class="grade-bar-container">
                <div class="grade-bar-bg">
                    <div class="grade-bar-fill" id="gradeBarFill" style="width:0%"></div>
                </div>
                <div class="grade-bar-labels"><span>0</span><span>5</span><span>10</span><span>15</span><span>20</span></div>
            </div>
            <div id="gradeBadge" class="grade-badge"></div>
            <p class="result-msg" id="resultMessage"></p>
            <div class="results-motto">— Tutor Franklin —</div>
            <br><br>
            <button class="btn btn-primary" onclick="restartQuiz()">🔄 Reintentar Examen</button>
        </div>

        <div class="nav-buttons" id="navButtons">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">← Anterior</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
        </div>
    </div>
</div>

<script>
const questions = [
    {
        question: "En la oración «Las niñas cantaban alegremente», ¿cuál es la flexión verbal correcta del verbo 'cantaban'?",
        options: [
            "Modo indicativo, tiempo presente, 3.ª persona del plural",
            "Modo indicativo, tiempo pretérito imperfecto, 3.ª persona del plural",
            "Modo subjuntivo, tiempo imperfecto, 3.ª persona del plural",
            "Modo indicativo, tiempo pretérito perfecto, 3.ª persona del singular",
            "Modo indicativo, tiempo futuro, 3.ª persona del plural"
        ],
        correct: 1,
        justification: "«Cantaban» es pretérito imperfecto de indicativo, 3.ª persona del plural: indica acción pasada continua o habitual. La morfología flexiva verbal incluye modo, tiempo, número y persona."
    },
    {
        question: "¿En cuál de las siguientes oraciones el verbo actúa como AUXILIAR?",
        options: [
            "El profesor tiene muchos libros en su oficina.",
            "María ha terminado el informe antes del mediodía.",
            "Los estudiantes tienen ganas de aprobar.",
            "El juez fue muy severo con el acusado.",
            "Ella quiere un café con leche."
        ],
        correct: 1,
        justification: "En «ha terminado», el verbo «haber» funciona como auxiliar que, junto al participio «terminado», forma la perífrasis verbal de aspecto perfectivo (pretérito perfecto compuesto). En las demás opciones los verbos son plenos."
    },
    {
        question: "Analiza la estructura morfológica de la palabra «desafortunadamente». ¿Cuál es el análisis correcto?",
        options: [
            "Raíz: fortun- / sufijo: -adamente / sin prefijo",
            "Prefijo: des- / raíz: afortun- / sufijo: -mente",
            "Prefijo: des- / raíz: fortun- / sufijo adjetival: -ada / sufijo adverbial: -mente",
            "Prefijo: des- / raíz: fort- / sufijo: -unadament- / sufijo: -e",
            "Sin prefijo / raíz: desafortuna- / sufijo: -damente"
        ],
        correct: 2,
        justification: "La estructura es: prefijo «des-» + raíz «fortun-» + sufijo adjetival «-ada» + sufijo adverbial «-mente». Es un ejemplo de derivación por prefijación y sufijación simultáneas sobre la base nominal «fortuna»."
    },
    {
        question: "¿Cuál de las siguientes palabras está formada ÚNICAMENTE por el proceso de DERIVACIÓN?",
        options: [
            "Bocacalle (boca + calle)",
            "Enamorar (en- + amor + -ar)",
            "Girasol (gira + sol)",
            "Sol (morfema libre, palabra simple)",
            "Desorden (prefijo des- + base orden)"
        ],
        correct: 4,
        justification: "«Desorden» se forma añadiendo el prefijo derivativo «des-» a la base «orden», sin que intervenga composición ni parasíntesis. Las otras opciones corresponden a composición (A, C), parasíntesis (B) o palabra simple (D)."
    },
    {
        question: "Identifica la palabra formada por el proceso de COMPOSICIÓN:",
        options: [
            "Rápidamente",
            "Desorden",
            "Girasol",
            "Lectora",
            "Subterráneo"
        ],
        correct: 2,
        justification: "«Girasol» se forma por composición de dos raíces léxicas: «gira» (de girar) + «sol». La composición une dos o más lexemas para crear una nueva palabra con significado propio y diferente al de sus componentes."
    },
    {
        question: "¿Cuál de las siguientes palabras es un ejemplo de PARASÍNTESIS?",
        options: [
            "Correr",
            "Deslealtad",
            "Maniobra",
            "Enamorar",
            "Portavoz"
        ],
        correct: 3,
        justification: "«Enamorar» es parasintética porque se forma simultáneamente con prefijo «en-» + base «amor» + sufijo verbal «-ar». Ninguna de las partes aisladas (*enamar o *amorar) existe como palabra independiente en español."
    },
    {
        question: "Señala la opción que distingue CORRECTAMENTE entre sigla y acrónimo:",
        options: [
            "ONU es acrónimo porque se lee letra por letra; radar es sigla porque se pronuncia como palabra.",
            "ONU es sigla porque se lee letra por letra; radar es acrónimo porque se pronuncia como una palabra.",
            "Ambas son siglas porque provienen de iniciales de palabras.",
            "Ambas son acrónimos porque pueden pronunciarse como palabras.",
            "La diferencia entre sigla y acrónimo es solo ortográfica, no fonética."
        ],
        correct: 1,
        justification: "Las siglas se deletrean letra a letra (O-N-U = Organización de las Naciones Unidas); los acrónimos se pronuncian como una sola palabra (radar, de Radio Detection And Ranging). La distinción es fonológica y morfológica."
    },
    {
        question: "En la oración «El amor es el motor de grandes hazañas», ¿qué tipo de sustantivo es «amor»?",
        options: [
            "Concreto, contable, propio",
            "Abstracto, incontable, común",
            "Concreto, incontable, colectivo",
            "Abstracto, contable, propio",
            "Concreto, contable, común"
        ],
        correct: 1,
        justification: "«Amor» es abstracto (no percibible sensorialmente), incontable (no se pluraliza con sentido habitual) y común (no designa un individuo específico sino una categoría). Son sus tres rasgos morfosemánticos fundamentales."
    },
    {
        question: "En «El examen fue sumamente difícil», el adjetivo «difícil» cumple la función sintáctica de:",
        options: [
            "Modificador directo del sustantivo «examen»",
            "Atributo del sujeto",
            "Complemento circunstancial de modo",
            "Complemento predicativo del objeto directo",
            "Modificador indirecto del núcleo verbal"
        ],
        correct: 1,
        justification: "Con verbos copulativos como «ser», «estar» o «parecer», el adjetivo funciona como atributo: se refiere al sujeto y es exigido por el verbo. Sin el atributo, la oración queda incompleta («El examen fue» carece de sentido pleno)."
    },
    {
        question: "En «Aquellos estudiantes que aprobaron recibirán sus diplomas», la palabra «Aquellos» es:",
        options: [
            "Pronombre demostrativo",
            "Determinante demostrativo",
            "Adjetivo calificativo",
            "Pronombre indefinido",
            "Determinante posesivo"
        ],
        correct: 1,
        justification: "«Aquellos» precede y acompaña directamente al sustantivo «estudiantes», actuando como determinante demostrativo. Si estuviera solo (sin el sustantivo), sería pronombre. Esta distinción es clave en morfología."
    },
    {
        question: "¿En cuál de las siguientes oraciones el verbo es INTRANSITIVO?",
        options: [
            "El alcalde inauguró la nueva plaza.",
            "Los niños duermen profundamente.",
            "María compró varios libros de historia.",
            "El jurado otorgó el premio al ganador.",
            "Ella recibió una carta de su familia."
        ],
        correct: 1,
        justification: "«Dormir» es intransitivo porque no admite complemento directo; la acción no recae sobre ningún objeto. El elemento «profundamente» es complemento circunstancial de modo, no objeto directo. En las demás opciones sí hay CD."
    },
    {
        question: "Identifica el tipo de conjunción empleada en: «Estudia mucho, pero no logra aprobar»:",
        options: [
            "Conjunción copulativa",
            "Conjunción disyuntiva",
            "Conjunción adversativa",
            "Conjunción causal",
            "Conjunción concesiva"
        ],
        correct: 2,
        justification: "«Pero» es una conjunción coordinante adversativa que expresa oposición o contraste entre las dos proposiciones. Es la conjunción adversativa más frecuente del español, junto a «mas», «sino» y «aunque»."
    },
    {
        question: "¿En cuál de las siguientes oraciones la preposición está usada INCORRECTAMENTE?",
        options: [
            "Llegó a tiempo para la reunión.",
            "Confío en la honestidad de mis amigos.",
            "Le informé al director sobre el problema.",
            "De acuerdo a las normas, está prohibido.",
            "Salió de la oficina a las cinco."
        ],
        correct: 3,
        justification: "La forma correcta es «de acuerdo con», no «de acuerdo a». Esta última es un galicismo (calco del francés *d'accord à*) que la RAE considera incorrecto en el español estándar. El régimen preposicional del español exige «con»."
    },
    {
        question: "En «Habló muy pausadamente», la palabra «muy» modifica a:",
        options: [
            "Al verbo «habló» directamente",
            "Al adverbio «pausadamente» (adverbio de adverbio)",
            "A toda la oración",
            "Al sujeto tácito de la oración",
            "Al predicado verbal completo"
        ],
        correct: 1,
        justification: "«Muy» es un adverbio de grado que modifica e intensifica al adverbio de modo «pausadamente». Los adverbios de grado pueden modificar adjetivos, adverbios y locuciones adverbiales, pero no directamente a verbos."
    },
    {
        question: "¿Cuál de las siguientes es una FRASE y no una oración?",
        options: [
            "Los pájaros cantan en el amanecer.",
            "Ella llegó tarde al examen.",
            "La brillante luz del sol de verano.",
            "Nosotros ganamos el campeonato.",
            "El perro ladra sin parar."
        ],
        correct: 2,
        justification: "«La brillante luz del sol de verano» es una frase nominal porque carece de verbo conjugado en forma personal. Una oración requiere necesariamente un predicado con verbo conjugado. Las opciones A, B, D y E sí tienen verbo conjugado."
    },
    {
        question: "¿Cuál de las siguientes oraciones es UNIMEMBRE?",
        options: [
            "Los estudiantes leen con atención.",
            "Ella canta muy bien.",
            "Llueve intensamente en la sierra.",
            "El director habló con firmeza.",
            "Nosotros ganamos el partido."
        ],
        correct: 2,
        justification: "«Llueve intensamente en la sierra» es unimembre porque contiene un verbo impersonal meteorológico («llover») que no admite sujeto gramatical. No puede dividirse en sujeto y predicado porque el verbo no concuerda con ningún sujeto."
    },
    {
        question: "En «Los brillantes alumnos de la universidad aprobaron el examen», ¿cuál es el NÚCLEO del sujeto?",
        options: [
            "Los brillantes alumnos",
            "Alumnos",
            "Los alumnos de la universidad",
            "Universidad",
            "Brillantes"
        ],
        correct: 1,
        justification: "El núcleo del sujeto es siempre el sustantivo o pronombre principal: «alumnos». Los demás elementos son sus modificadores: «los» (determinante), «brillantes» (modificador directo) y «de la universidad» (modificador indirecto)."
    },
    {
        question: "Identifica el COMPLEMENTO INDIRECTO en: «El profesor entregó los certificados a los egresados»:",
        options: [
            "El profesor",
            "Los certificados",
            "A los egresados",
            "Entregó los certificados",
            "Con mucho esfuerzo"
        ],
        correct: 2,
        justification: "«A los egresados» es el complemento indirecto: indica el destinatario de la acción. Se verifica reemplazándolo por el pronombre átono «les»: «El profesor les entregó los certificados». El CD es «los certificados» (¿qué entregó?)."
    },
    {
        question: "En «El libro fue escrito por García Márquez en Bogotá», ¿cuál es el complemento agente?",
        options: [
            "El libro",
            "En Bogotá",
            "Fue escrito",
            "Por García Márquez",
            "García Márquez en Bogotá"
        ],
        correct: 3,
        justification: "«Por García Márquez» es el complemento agente, propio de las oraciones pasivas, que indica quién realiza la acción. Se introduce con la preposición «por» y puede transformarse en sujeto al pasar a la voz activa: «García Márquez escribió el libro»."
    },
    {
        question: "¿En cuál de las siguientes oraciones hay un error de CONCORDANCIA gramatical?",
        options: [
            "Las alumnas estudiosas aprobaron el examen.",
            "Hubieron muchos problemas durante el proceso.",
            "Los niños y las niñas jugaron en el parque.",
            "Ella misma resolvió el problema.",
            "Los jóvenes talentosos ganaron el concurso."
        ],
        correct: 1,
        justification: "«Hubieron» es incorrecto. El verbo «haber» usado como impersonal existencial no varía en número; siempre debe estar en singular. La forma correcta es «Hubo muchos problemas». Es el solecismo de concordancia más frecuente en español."
    },
    {
        question: "Selecciona el conector más adecuado: «Estudió toda la noche; _______, no pudo terminar el examen a tiempo»:",
        options: [
            "Por lo tanto",
            "Además",
            "Sin embargo",
            "Es decir",
            "Por ejemplo"
        ],
        correct: 2,
        justification: "«Sin embargo» es un conector adversativo que expresa contraste: a pesar del esfuerzo (estudiar toda la noche), el resultado fue contrario al esperado. Los conectores A y B son consecutivo y aditivo, respectivamente, que contradirían la lógica del texto."
    },
    {
        question: "¿Qué tipo de relación lógica establece el conector «por consiguiente»?",
        options: [
            "Adversativa",
            "Causal",
            "Consecutiva",
            "Concesiva",
            "Aditiva"
        ],
        correct: 2,
        justification: "«Por consiguiente» es un conector consecutivo o de conclusión: introduce la consecuencia lógica que se deriva de lo expresado anteriormente. Equivale a «por tanto», «en consecuencia» y «así pues». No debe confundirse con los causales («porque», «puesto que»)."
    },
    {
        question: "En el enunciado «Este libro que te di ayer lo encontré aquí», ¿cuáles son los elementos que funcionan como deícticos de persona, lugar y tiempo, respectivamente?",
        options: [
            "«libro», «encontré» y «ayer»",
            "«Este», «lo» y «aquí»",
            "«te», «aquí» y «ayer»",
            "«Este», «aquí» y «libro»",
            "«lo», «ayer» y «encontré»"
        ],
        correct: 2,
        justification: "«te» es deíctico de persona (2.ª persona, deixis personal); «aquí» es deíctico de lugar (deixis espacial); «ayer» es deíctico de tiempo (deixis temporal). La pregunta solicita un representante de cada tipo de deixis, lo que determina unívocamente la respuesta correcta."
    },
    {
        question: "¿En cuál de las siguientes oraciones el uso de la coma es INCORRECTO?",
        options: [
            "Juan, el más inteligente del grupo, aprobó primero.",
            "Compré pan, leche, huevos y frutas.",
            "Si estudias con dedicación, aprobarás el examen.",
            "El director, ordenó silencio en la sala.",
            "Aunque llovía, salimos a caminar."
        ],
        correct: 3,
        justification: "En «El director, ordenó silencio», la coma es incorrecta porque separa el sujeto («El director») de su predicado («ordenó silencio»). La RAE prohíbe expresamente colocar coma entre el sujeto y el verbo principal, salvo que medie un inciso."
    },
    {
        question: "¿En cuál de las opciones los dos puntos están usados CORRECTAMENTE?",
        options: [
            "Llegó tarde: porque el bus se averió.",
            "Ella desea: estudiar medicina en la UNSCH.",
            "El juez sentenció: «El acusado es culpable».",
            "Los días hábiles son: lunes, martes y miércoles.",
            "Compró: libros, cuadernos y lapiceros."
        ],
        correct: 2,
        justification: "Los dos puntos se usan correctamente antes de una cita textual introducida por un verbo de lengua (sentenció, dijo, afirmó). En las opciones A, B y E los dos puntos interrumpen incorrectamente el vínculo entre el verbo y sus complementos directos."
    },
    {
        question: "¿Cuál es el uso CORRECTO de la raya (—) en el texto escrito?",
        options: [
            "Para separar sílabas al final de una línea.",
            "Para unir palabras compuestas como «físico-matemático».",
            "Para encerrar incisos o aclaraciones en un texto narrativo.",
            "Para indicar la división silábica en el diccionario.",
            "Para separar prefijos de palabras como «ex-presidente»."
        ],
        correct: 2,
        justification: "La raya (—) se usa para encerrar incisos o aclaraciones (función similar a los paréntesis), para introducir el diálogo en narrativa y para el comentario del narrador dentro del diálogo. Las opciones A, B, D y E corresponden al guion corto (-), signo distinto."
    },
    {
        question: "¿En cuál de los siguientes casos el uso de las comillas es el ÚNICO recurso ortográfico adecuado y no puede reemplazarse por ningún otro signo?",
        options: [
            "Para introducir el diálogo en textos narrativos.",
            "Para encerrar aclaraciones o datos complementarios dentro de una oración.",
            "Para indicar que una palabra se emplea en sentido irónico o con significado especial.",
            "Para marcar una pausa larga con suspenso al final de una frase.",
            "Para separar una aclaración extensa del resto del texto narrativo."
        ],
        correct: 2,
        justification: "Cuando una palabra se usa en sentido irónico, metafórico o impropio, las comillas son el único recurso adecuado. En cambio, el diálogo (A) puede marcarse con raya; las aclaraciones (B, E) admiten paréntesis o rayas; las pausas (D) corresponden a puntos suspensivos."
    },
    {
        question: "¿En cuál de las siguientes opciones el uso de los puntos suspensivos es INCORRECTO?",
        options: [
            "«No sé cómo decirte esto… es muy complicado».",
            "«Vine, vi… y perdí todo».",
            "«Los países visitados fueron: Francia, Italia, España…».",
            "«Dijo que vendría… pero ya son las diez de la noche».",
            "«El examen consta de 30 preguntas... de opción múltiple»."
        ],
        correct: 4,
        justification: "En «30 preguntas... de opción múltiple», los puntos suspensivos son innecesarios porque no hay pausa significativa, enumeración incompleta ni suspenso expresivo. Interrumpen artificialmente una frase que no lo requiere, constituyendo un uso incorrecto."
    },
    {
        question: "¿Cuál es la característica que distingue al OFICIO de los demás documentos administrativos?",
        options: [
            "Es un documento personal que se dirige a una autoridad para solicitar algo.",
            "Es un documento de comunicación oficial entre instituciones o dependencias del Estado.",
            "Es un documento interno que resume los acuerdos de una reunión.",
            "Es un documento que informa sobre los resultados de una investigación encargada.",
            "Es un documento breve que sirve para recordar o instruir sobre algo urgente."
        ],
        correct: 1,
        justification: "El oficio es un documento de carácter institucional usado entre organismos públicos o entre dependencias de una misma institución. A diferencia de la solicitud (personal), el memorando (interno y breve) o el informe (técnico), el oficio es el canal formal interinstitucional."
    },
    {
        question: "En la redacción de una SOLICITUD, ¿qué parte del documento contiene la presentación personal del solicitante y el fundamento legal del pedido?",
        options: [
            "El encabezamiento",
            "La conclusión o cierre",
            "El cuerpo o texto",
            "La sumilla",
            "El pie de firma"
        ],
        correct: 2,
        justification: "El cuerpo o texto de la solicitud contiene: la presentación del solicitante (nombre, DNI, domicilio), la exposición de motivos con el fundamento legal o reglamentario y el petitorio concreto. El encabezamiento solo identifica al destinatario; la sumilla resume el asunto."
    },
    {
        question: "¿Cuál es la principal función del MEMORANDO como documento administrativo?",
        options: [
            "Solicitar un trámite ante una autoridad superior externa.",
            "Comunicar disposiciones, informaciones o recordatorios de forma interna y breve.",
            "Presentar los resultados detallados de una comisión de trabajo.",
            "Establecer comunicación formal entre dos entidades públicas distintas.",
            "Certificar hechos o situaciones con valor legal ante terceros."
        ],
        correct: 1,
        justification: "El memorando es un documento de comunicación interna, breve y directo, utilizado dentro de una institución para transmitir órdenes, disposiciones o recordatorios entre áreas o funcionarios del mismo organismo. No se dirige a entidades externas."
    },
    {
        question: "A diferencia de otros documentos administrativos, el INFORME se caracteriza por:",
        options: [
            "Ser un documento de comunicación entre instituciones del Estado.",
            "Presentar un pedido formal ante una autoridad competente.",
            "Exponer de manera objetiva y fundamentada hechos, situaciones o resultados ante quien lo solicitó.",
            "Registrar los acuerdos adoptados en una sesión o reunión oficial.",
            "Comunicar de forma breve y directa una disposición interna."
        ],
        correct: 2,
        justification: "El informe es un documento técnico-administrativo que expone con objetividad y sustento hechos investigados, situaciones evaluadas o tareas encargadas. Siempre lo elabora un subordinado para el superior que lo solicitó, con estructura argumentativa y conclusiones."
    },
    {
        question: "¿Cuál de las siguientes oraciones contiene el vicio del lenguaje denominado PLEONASMO?",
        options: [
            "«Tuvo que ir al médico por el accidente que sufrió».",
            "«Subió arriba a buscar sus documentos».",
            "«El gerente hizo una reunión con los trabajadores».",
            "«Le dije a Juan que viniera».",
            "«La mayoría de los alumnos aprobaron el examen»."
        ],
        correct: 1,
        justification: "«Subió arriba» es un pleonasmo: redundancia innecesaria porque el verbo «subir» ya implica dirección hacia arriba. Otros ejemplos: «bajar abajo», «salir afuera», «entrar adentro». El pleonasmo puede ser vicioso (innecesario) o expresivo (literario)."
    },
    {
        question: "Identifica el vicio de dicción presente en: «Vi a la empleada del director con el maletín»:",
        options: [
            "Pleonasmo, por redundancia innecesaria",
            "Solecismo, por error de concordancia",
            "Anfibología, por ambigüedad en el sentido",
            "Cacofonía, por repetición de sonidos desagradables",
            "Barbarismo, por uso de palabra extranjera incorrecta"
        ],
        correct: 2,
        justification: "La anfibología es un vicio sintáctico que produce ambigüedad: no queda claro si el maletín lo tenía la empleada o el director. Esta doble interpretación surge por la construcción sintáctica imprecisa del complemento con preposición «con»."
    },
    {
        question: "En la oración «Hubieron muchos inconvenientes en el proceso electoral», el vicio cometido es:",
        options: [
            "Pleonasmo",
            "Anfibología",
            "Cacofonía",
            "Solecismo",
            "Barbarismo"
        ],
        correct: 3,
        justification: "Es un solecismo: error morfosintáctico por usar «haber» impersonal existencial en plural («hubieron») cuando debe permanecer invariable en singular («Hubo muchos inconvenientes»). El solecismo es el vicio que viola las reglas gramaticales del idioma."
    }
];

let currentQuestion = 0;
let score = 0;
let answered = false;
const userAnswers = [];

function initQuiz() { renderQuestion(); updateProgress(); updateButtons(); }

function renderQuestion() {
    const q = questions[currentQuestion];
    const container = document.getElementById('quizContainer');
    const letters = ['A', 'B', 'C', 'D', 'E'];
    container.innerHTML = `
        <div class="question-card active">
            <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
            <div class="question-text">${q.question}</div>
            <div class="options">
                ${q.options.map((option, index) => `
                    <div class="option" onclick="selectOption(${index})" data-index="${index}">
                        <span class="option-letter">${letters[index]}</span>
                        <span>${option}</span>
                    </div>
                `).join('')}
            </div>
            <div class="justification" id="justification">
                <strong>💡 Justificación:</strong> ${q.justification}
            </div>
        </div>
    `;
    if (userAnswers[currentQuestion] !== undefined) showPreviousAnswer();
}

function selectOption(index) {
    if (answered) return;
    const options = document.querySelectorAll('.option');
    options.forEach(opt => opt.classList.remove('selected'));
    options[index].classList.add('selected');
    answered = true;
    userAnswers[currentQuestion] = index;
    const q = questions[currentQuestion];
    setTimeout(() => {
        if (index === q.correct) { options[index].classList.add('correct'); score++; }
        else { options[index].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
        options.forEach(opt => opt.classList.add('disabled'));
        document.getElementById('justification').classList.add('show');
        updateButtons();
    }, 300);
}

function showPreviousAnswer() {
    const options = document.querySelectorAll('.option');
    const userAnswer = userAnswers[currentQuestion];
    const q = questions[currentQuestion];
    options[userAnswer].classList.add('selected');
    if (userAnswer === q.correct) options[userAnswer].classList.add('correct');
    else { options[userAnswer].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
    options.forEach(opt => opt.classList.add('disabled'));
    document.getElementById('justification').classList.add('show');
    answered = true;
}

function nextQuestion() {
    if (!answered && userAnswers[currentQuestion] === undefined) {
        alert('Por favor, selecciona una respuesta antes de continuar.');
        return;
    }
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        answered = userAnswers[currentQuestion] !== undefined;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    } else { showResults(); }
}

function previousQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        answered = true;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    }
}

function updateButtons() {
    document.getElementById('prevBtn').disabled = currentQuestion === 0;
    document.getElementById('nextBtn').textContent = (currentQuestion === questions.length - 1)
        ? (answered ? 'Ver Resultados 🎯' : 'Finalizar 🎯')
        : 'Siguiente →';
}

function updateProgress() {
    const pct = Math.round(((currentQuestion + 1) / questions.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
    document.getElementById('progressPct').textContent = pct + '%';
}

function showResults() {
    document.getElementById('quizContainer').style.display = 'none';
    document.getElementById('navButtons').style.display = 'none';
    document.getElementById('results').classList.add('show');
    const total = questions.length;
    const nota = Math.round((score / total) * 20);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('totalQuestions').textContent = total;
    document.getElementById('finalNota').textContent = nota;
    setTimeout(() => {
        document.getElementById('gradeBarFill').style.width = ((nota / 20) * 100) + '%';
    }, 200);
    const badge = document.getElementById('gradeBadge');
    const msg = document.getElementById('resultMessage');
    if (nota >= 17) {
        badge.textContent = '🏆 Sobresaliente'; badge.className = 'grade-badge badge-excelente';
        msg.textContent = '¡Excelente desempeño! Dominas con solidez los temas de Lenguaje. ¡Así se llega a la universidad! 🌟';
    } else if (nota >= 14) {
        badge.textContent = '👏 Aprobado — Bueno'; badge.className = 'grade-badge badge-bueno';
        msg.textContent = '¡Muy bien! Tienes buenos conocimientos de Lenguaje. Refuerza los temas donde fallaste y estarás listo para el examen de admisión. 📚';
    } else if (nota >= 11) {
        badge.textContent = '📖 Aprobado — Regular'; badge.className = 'grade-badge badge-regular';
        msg.textContent = 'Vas por buen camino, pero aún hay temas que necesitan más repaso. ¡Tú puedes mejorar, sigue adelante! ✏️';
    } else {
        badge.textContent = '💪 Desaprobado — Sigue intentando'; badge.className = 'grade-badge badge-desaprobado';
        msg.textContent = 'No te rindas. Cada error es una lección. Repasa los temas con calma, vuelve a intentarlo y verás cómo mejoras. ¡Ánimo! 🔥';
    }
}

function restartQuiz() {
    currentQuestion = 0; score = 0; answered = false; userAnswers.length = 0;
    document.getElementById('gradeBarFill').style.width = '0%';
    document.getElementById('quizContainer').style.display = 'block';
    document.getElementById('navButtons').style.display = 'flex';
    document.getElementById('results').classList.remove('show');
    initQuiz();
}

initQuiz();
</script>
