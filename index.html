<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Biología - Academia Sofía</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #0a7c4e;
            --green-mid: #1a9e66;
            --green-light: #2ecc8a;
            --green-pale: #e6f7f1;
            --green-ultra: #f0fdf8;
            --gold: #c9a84c;
            --gold-light: #e8c96a;
            --gold-pale: #fdf6e3;
            --warm-white: #ffffff;
            --cream: #f8fdf9;
            --text: #0d2e1e;
            --text-soft: #4a7a5e;
            --border: #b8e0ce;
            --correct: #1a7a4a;
            --correct-bg: #e6f7ee;
            --incorrect: #c0392b;
            --incorrect-bg: #fdecea;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #e6f7f1 0%, #f0fdf8 40%, #fdf6e3 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: var(--warm-white);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(10,124,78,0.15), 0 0 0 1px rgba(10,124,78,0.12);
            max-width: 860px;
            width: 100%;
            overflow: hidden;
            animation: fadeUp 0.6s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .academy-header {
            background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 60%, #27ae74 100%);
            padding: 32px 40px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .academy-header::before {
            content: '';
            position: absolute;
            top: -40px; left: -40px; right: -40px; bottom: -40px;
            background-image: repeating-linear-gradient(
                45deg, transparent, transparent 28px,
                rgba(255,255,255,0.05) 28px, rgba(255,255,255,0.05) 29px
            );
        }
        .academy-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .logo-container {
            position: relative;
            width: 100%; max-width: 300px;
            margin: 0 auto 16px;
        }
        .logo-container img { width: 100%; height: auto; max-height: 120px; object-fit: contain; }
        .gold-divider {
            width: 80px; height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
            margin: 10px auto 0;
        }

        /* INNER */
        .inner { padding: 36px 44px 40px; background: var(--cream); }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9em;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .header h1 span { color: var(--green); }
        .header p { color: var(--text-soft); font-size: 1em; font-weight: 600; }

        /* PROGRESS */
        .progress-wrapper { margin-bottom: 28px; }
        .progress-info {
            display: flex; justify-content: space-between;
            font-size: 0.85em; color: var(--text-soft);
            font-weight: 700; margin-bottom: 8px;
        }
        .progress-bar {
            width: 100%; height: 10px;
            background: var(--green-pale); border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--gold));
            width: 0%; transition: width 0.4s ease; border-radius: 10px;
        }

        /* QUESTION */
        .question-card { display: none; animation: slideIn 0.35s ease; }
        .question-card.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .question-number {
            display: inline-block;
            background: var(--green-pale);
            color: var(--green);
            font-weight: 700; font-size: 0.82em;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 50px; margin-bottom: 14px;
            border: 1.5px solid var(--border);
        }
        .question-text {
            font-size: 1.2em; color: var(--text);
            margin-bottom: 22px; line-height: 1.65; font-weight: 600;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 16px 22px;
            border: 2px solid var(--border);
            border-radius: 12px; cursor: pointer;
            transition: all 0.25s ease;
            font-size: 1.05em; background: var(--warm-white);
            color: var(--text);
            display: flex; align-items: center; gap: 12px;
        }
        .option-letter {
            width: 30px; height: 30px; min-width: 30px;
            border-radius: 50%;
            background: var(--green-ultra);
            border: 2px solid var(--green-light);
            color: var(--green);
            font-weight: 800; font-size: 0.85em;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s ease;
        }
        .option:hover {
            border-color: var(--green);
            background: var(--green-ultra);
            transform: translateX(6px);
            box-shadow: 0 4px 16px rgba(10,124,78,0.1);
        }
        .option:hover .option-letter {
            background: var(--green); color: white; border-color: var(--green);
        }
        .option.selected { border-color: var(--green); background: var(--green-pale); }
        .option.correct { border-color: var(--correct); background: var(--correct-bg); }
        .option.correct .option-letter { background: var(--correct); color: white; border-color: var(--correct); }
        .option.incorrect { border-color: var(--incorrect); background: var(--incorrect-bg); }
        .option.incorrect .option-letter { background: var(--incorrect); color: white; border-color: var(--incorrect); }
        .option.disabled { cursor: not-allowed; }
        .option.disabled:hover { transform: none; box-shadow: none; }

        /* JUSTIFICATION */
        .justification {
            display: none;
            margin-top: 20px; padding: 18px 22px;
            background: linear-gradient(to right, var(--green-ultra), var(--gold-pale));
            border-left: 4px solid var(--green);
            border-radius: 10px;
            animation: fadeUp 0.4s ease;
            font-size: 1em; color: var(--text-soft); line-height: 1.6;
        }
        .justification.show { display: block; }
        .justification strong { color: var(--green); }

        /* NAV */
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; gap: 14px; }
        .btn {
            padding: 14px 32px; border: none; border-radius: 10px;
            font-size: 1em; cursor: pointer;
            transition: all 0.25s ease; font-weight: 700;
            font-family: 'Nunito', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--green), var(--green-mid));
            color: white;
            box-shadow: 0 4px 16px rgba(10,124,78,0.3);
            border: 2px solid transparent;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(10,124,78,0.4);
            background: linear-gradient(135deg, var(--green-mid), var(--gold));
            color: white;
        }
        .btn-secondary {
            background: var(--warm-white); color: var(--text-soft); border: 2px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--green-pale); border-color: var(--green); color: var(--green);
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* RESULTS */
        .results { display: none; text-align: center; }
        .results.show { display: block; }
        .results h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9em; color: var(--text); margin-bottom: 8px;
        }
        .score-circle {
            width: 200px; height: 200px; border-radius: 50%;
            background: linear-gradient(135deg, var(--green), var(--green-mid));
            border: 5px solid var(--gold);
            color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            margin: 28px auto 14px;
            box-shadow: 0 12px 40px rgba(10,124,78,0.3), 0 0 0 10px rgba(201,168,76,0.1);
        }
        .nota-label { font-size: 0.82em; opacity: 0.85; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; color: var(--gold-light); }
        .nota-valor { font-family: 'Playfair Display', serif; font-size: 4em; font-weight: 900; line-height: 1; color: white; }
        .nota-total { font-size: 1em; opacity: 0.75; color: var(--gold-light); }
        .score-detail {
            display: inline-block; background: var(--warm-white);
            border: 2px solid var(--border); border-radius: 12px;
            padding: 10px 28px; margin-bottom: 20px;
            font-size: 1em; color: var(--text-soft);
        }
        .score-detail span { font-weight: 800; color: var(--green); }
        .grade-bar-container { width: 100%; max-width: 480px; margin: 0 auto 20px; }
        .grade-bar-bg { width: 100%; height: 16px; background: var(--green-pale); border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
        .grade-bar-fill { height: 100%; border-radius: 10px; transition: width 1s ease; background: linear-gradient(90deg, var(--green), var(--gold)); }
        .grade-bar-labels { display: flex; justify-content: space-between; font-size: 0.78em; color: #bbb; padding: 0 2px; }
        .grade-badge {
            display: inline-block; padding: 8px 24px; border-radius: 50px;
            font-weight: 800; font-size: 1em; margin-bottom: 16px; letter-spacing: 0.5px;
        }
        .badge-excelente   { background: #e6f7ee; color: #1a7a4a; border: 2px solid #2ecc71; }
        .badge-bueno       { background: #e8f4fd; color: #1565c0; border: 2px solid #3498db; }
        .badge-regular     { background: #fef9e7; color: #b7770d; border: 2px solid #f1c40f; }
        .badge-desaprobado { background: #fdecea; color: #c0392b; border: 2px solid #e74c3c; }
        .results p.result-msg {
            font-size: 1.1em; color: var(--text-soft); margin-bottom: 24px;
            line-height: 1.7; max-width: 500px; margin-left: auto; margin-right: auto;
        }
        .results-motto {
            background: linear-gradient(135deg, var(--green), var(--green-mid));
            color: var(--gold-light);
            padding: 14px 32px; border-radius: 50px;
            font-weight: 800; font-size: 1.05em;
            display: inline-block; margin-top: 8px;
            letter-spacing: 1.5px; text-transform: uppercase;
            box-shadow: 0 4px 16px rgba(10,124,78,0.3);
            border: 2px solid rgba(201,168,76,0.4);
        }

        @media (max-width: 600px) {
            .inner { padding: 24px 20px; }
            .academy-header { padding: 24px 20px; }
            .header h1 { font-size: 1.5em; }
            .question-text { font-size: 1.05em; }
            .nav-buttons { flex-direction: column; }
            .score-circle { width: 160px; height: 160px; }
            .nota-valor { font-size: 3.2em; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="academy-header">
        <div class="logo-container">
            <img src="logo_SOFIA-Photoroom.png" alt="Logo Academia Sofía">
        </div>
        <div class="gold-divider"></div>
    </div>

    <div class="inner">
        <div class="header">
            <h1>🧬 Examen de <span>Biología</span></h1>
            <p>Ciclo Repaso · 33 Preguntas</p>
        </div>

        <div class="progress-wrapper">
            <div class="progress-info">
                <span id="progressText">Pregunta 1 de 33</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="quizContainer"></div>

        <div class="results" id="results">
            <h2>🎉 ¡Examen Completado!</h2>
            <div class="score-circle">
                <div class="nota-label">Tu nota</div>
                <div class="nota-valor" id="finalNota">0</div>
                <div class="nota-total">/ 20</div>
            </div>
            <div class="score-detail">
                Respuestas correctas: <span id="finalScore">0</span> de <span id="totalQuestions">33</span>
            </div>
            <div class="grade-bar-container">
                <div class="grade-bar-bg">
                    <div class="grade-bar-fill" id="gradeBarFill" style="width:0%"></div>
                </div>
                <div class="grade-bar-labels"><span>0</span><span>5</span><span>10</span><span>15</span><span>20</span></div>
            </div>
            <div id="gradeBadge" class="grade-badge"></div>
            <p class="result-msg" id="resultMessage"></p>
            <div class="results-motto">— Tutor Franklin —</div>
            <br><br>
            <button class="btn btn-primary" onclick="restartQuiz()">🔄 Reintentar Examen</button>
        </div>

        <div class="nav-buttons" id="navButtons">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">← Anterior</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
        </div>
    </div>
</div>

<script>
const questions = [
    {
        question: "El fragmento de ADN que contiene la información necesaria para la síntesis de una proteína o para determinar un carácter hereditario se denomina:",
        options: ["Cromosoma", "Locus", "Gen", "Alelo", "Genotipo"],
        correct: 2,
        justification: "El gen es la unidad básica de la herencia y contiene la información genética para producir proteínas o determinar características."
    },
    {
        question: "El lugar específico que ocupa un gen dentro de un cromosoma se denomina:",
        options: ["Locus", "Cromatina", "Alelo", "Fenotipo", "Centrómero"],
        correct: 0,
        justification: "El locus es la posición fija que ocupa un gen en un cromosoma."
    },
    {
        question: "Cuando un individuo posee dos alelos iguales para un carácter se dice que presenta un genotipo:",
        options: ["Heterocigoto", "Dominante", "Recesivo", "Homocigoto", "Híbrido"],
        correct: 3,
        justification: "Un individuo homocigoto posee dos alelos iguales para un mismo gen (por ejemplo AA o aa)."
    },
    {
        question: "El conjunto de características observables de un organismo producto de la interacción entre genotipo y ambiente se denomina:",
        options: ["Genotipo", "Fenotipo", "Locus", "Alelo", "Mutación"],
        correct: 1,
        justification: "El fenotipo corresponde a las características visibles o expresadas de un organismo, resultado de su genotipo y el ambiente."
    },
    {
        question: "Según la Primera Ley de Mendel, el cruce entre dos líneas puras produce en la generación F1 individuos:",
        options: ["Homocigotos dominantes", "Homocigotos recesivos", "Heterocigotos uniformes", "Mutantes", "Diferentes entre sí"],
        correct: 2,
        justification: "La Ley de Uniformidad establece que la primera generación filial (F1) es uniforme y heterocigota al cruzar dos líneas puras."
    },
    {
        question: "La proporción fenotípica 3:1 observada en la segunda generación filial (F2) corresponde a la:",
        options: ["Ley de la uniformidad", "Ley de la segregación", "Ley de la dominancia incompleta", "Ley de la mutación", "Ley de la evolución"],
        correct: 1,
        justification: "En la F2 los alelos se separan durante la formación de gametos (segregación), produciendo la proporción fenotípica 3:1."
    },
    {
        question: "La hemofilia es una enfermedad hereditaria ligada al cromosoma:",
        options: ["X", "Y", "Autosómico dominante", "Autosómico recesivo", "Mitocondrial"],
        correct: 0,
        justification: "La hemofilia es un trastorno genético recesivo ligado al cromosoma X, por eso afecta principalmente a varones."
    },
    {
        question: "En el sistema ABO, el grupo sanguíneo AB presenta el genotipo:",
        options: ["IAIA", "IBIB", "IAIB", "ii", "IAi"],
        correct: 2,
        justification: "El grupo AB resulta de la codominancia de los alelos IA e IB, ambos se expresan simultáneamente."
    },
    {
        question: "La presencia de un cromosoma extra en un par de cromosomas homólogos se denomina:",
        options: ["Monosomía", "Trisomía", "Diploidía", "Haploidía", "Euploidía"],
        correct: 1,
        justification: "La trisomía ocurre cuando existen tres cromosomas en lugar de dos en un par homólogo (ejemplo: síndrome de Down = trisomía 21)."
    },
    {
        question: "El síndrome caracterizado por la presencia de un cromosoma X adicional en varones (47, XXY) se denomina:",
        options: ["Síndrome de Down", "Síndrome de Turner", "Síndrome de Klinefelter", "Síndrome de Patau", "Síndrome de Edwards"],
        correct: 2,
        justification: "El síndrome de Klinefelter ocurre en varones con cariotipo XXY (47 cromosomas), causando infertilidad y otras características."
    },
    {
        question: "La teoría que sostiene que un ser supremo creó el universo y todos los seres vivos se denomina:",
        options: ["Abiogénesis", "Panspermia", "Creacionismo", "Quimiosintética", "Mutacionismo"],
        correct: 2,
        justification: "El creacionismo sostiene que la vida fue creada por un ser divino o supremo, de forma intencional y directa."
    },
    {
        question: "La idea de que la vida podía originarse espontáneamente a partir de materia inerte se conoce como:",
        options: ["Biogénesis", "Generación espontánea", "Evolución", "Selección natural", "Mutación"],
        correct: 1,
        justification: "La generación espontánea era una teoría antigua que afirmaba que la vida surgía directamente de materia no viva."
    },
    {
        question: "El científico que refutó definitivamente la generación espontánea mediante el experimento del matraz de cuello de cisne fue:",
        options: ["Oparin", "Darwin", "Pasteur", "Lamarck", "Arrhenius"],
        correct: 2,
        justification: "Louis Pasteur demostró con su famoso experimento que los microorganismos provienen siempre de otros microorganismos, no de la materia inerte."
    },
    {
        question: "La teoría que plantea que la vida llegó a la Tierra desde el espacio exterior se denomina:",
        options: ["Abiogénesis", "Panspermia", "Creacionismo", "Biogénesis", "Quimiosíntesis"],
        correct: 1,
        justification: "La panspermia propone que la vida o sus precursores llegaron a la Tierra desde el espacio en meteoritos o cometas."
    },
    {
        question: "Según la teoría quimiosintética de Oparin, los primeros agregados moleculares que dieron origen a la vida fueron llamados:",
        options: ["Mutaciones", "Protobiontes", "Coacervados", "Genes", "Células"],
        correct: 2,
        justification: "Oparin propuso que los coacervados fueron estructuras coloidales precursoras de las primeras células, capaces de crecer y dividirse."
    },
    {
        question: "El principio que propone que el uso frecuente de un órgano provoca su desarrollo pertenece a la teoría de:",
        options: ["Darwin", "Lamarck", "Mendel", "Oparin", "Wallace"],
        correct: 1,
        justification: "Lamarck planteó la ley del uso y desuso: los órganos que se usan frecuentemente se desarrollan, y los que no se usan se atrofian."
    },
    {
        question: "La teoría de Darwin explica la evolución mediante el proceso denominado:",
        options: ["Mutación genética", "Selección natural", "Deriva genética", "Hibridación", "Panspermia"],
        correct: 1,
        justification: "La selección natural favorece a los individuos mejor adaptados al ambiente, que sobreviven y se reproducen con mayor éxito."
    },
    {
        question: "La teoría sintética de la evolución combina la selección natural con los conocimientos de:",
        options: ["Fisiología", "Citología", "Genética", "Ecología", "Botánica"],
        correct: 2,
        justification: "La síntesis moderna o neodarwinismo integra la genética mendeliana y la genética de poblaciones con la teoría de Darwin."
    },
    {
        question: "El sistema de clasificación de los seres vivos en cinco reinos fue propuesto por:",
        options: ["Aristóteles", "Linneo", "Whittaker", "Haeckel", "Woese"],
        correct: 2,
        justification: "Robert Whittaker propuso en 1969 la clasificación en cinco reinos: Monera, Protista, Fungi, Plantae y Animalia."
    },
    {
        question: "El sistema de nomenclatura que utiliza dos palabras en latín para nombrar a las especies se denomina:",
        options: ["Clasificación jerárquica", "Nomenclatura binomial", "Sistemática molecular", "Dominio biológico", "Taxonomía evolutiva"],
        correct: 1,
        justification: "Linneo estableció la nomenclatura binomial, usando dos nombres en latín: género y especie (ejemplo: Homo sapiens)."
    },
    {
        question: "La ciencia que estudia las relaciones entre los seres vivos y su ambiente se denomina:",
        options: ["Genética", "Taxonomía", "Ecología", "Citología", "Anatomía"],
        correct: 2,
        justification: "La ecología analiza las interacciones entre los organismos y entre estos y su entorno físico y biológico."
    },
    {
        question: "El conjunto de individuos de la misma especie que habitan en un área determinada se denomina:",
        options: ["Comunidad", "Ecosistema", "Población", "Nicho", "Biosfera"],
        correct: 2,
        justification: "Una población está formada por individuos de la misma especie que comparten un mismo lugar y tiempo."
    },
    {
        question: "El conjunto de poblaciones que interactúan en un mismo lugar se denomina:",
        options: ["Ecosistema", "Comunidad", "Bioma", "Nicho", "Hábitat"],
        correct: 1,
        justification: "La comunidad o biocenosis es el conjunto de poblaciones de diferentes especies que conviven e interactúan en un área determinada."
    },
    {
        question: "Los organismos que producen su propio alimento mediante fotosíntesis o quimiosíntesis se denominan:",
        options: ["Consumidores", "Descomponedores", "Productores", "Parásitos", "Detritívoros"],
        correct: 2,
        justification: "Los productores (plantas, algas, cianobacterias) generan materia orgánica a partir de compuestos inorgánicos usando energía solar o química."
    },
    {
        question: "Los organismos que se alimentan directamente de plantas son llamados:",
        options: ["Consumidores terciarios", "Carnívoros", "Herbívoros", "Descomponedores", "Omnívoros"],
        correct: 2,
        justification: "Los herbívoros son consumidores primarios que se alimentan directamente de los productores (vegetales)."
    },
    {
        question: "Los organismos que degradan materia orgánica muerta y reciclan nutrientes en el ecosistema son:",
        options: ["Productores", "Consumidores", "Descomponedores", "Parásitos", "Autótrofos"],
        correct: 2,
        justification: "Los descomponedores (hongos y bacterias) degradan materia orgánica muerta y devuelven los nutrientes al suelo."
    },
    {
        question: "El lugar físico donde vive un organismo se denomina:",
        options: ["Nicho ecológico", "Hábitat", "Biocenosis", "Población", "Ecosistema"],
        correct: 1,
        justification: "El hábitat es el ambiente físico específico donde vive y se desarrolla una especie determinada."
    },
    {
        question: "La función o papel que desempeña una especie dentro de un ecosistema se llama:",
        options: ["Hábitat", "Nicho ecológico", "Biotopo", "Bioma", "Comunidad"],
        correct: 1,
        justification: "El nicho ecológico describe el rol funcional de una especie: qué come, cómo se relaciona y cómo influye en el ecosistema."
    },
    {
        question: "La relación interespecífica en la que ambas especies se benefician se denomina:",
        options: ["Parasitismo", "Comensalismo", "Mutualismo", "Depredación", "Competencia"],
        correct: 2,
        justification: "En el mutualismo ambas especies obtienen beneficios de la relación (ejemplo: las abejas y las flores)."
    },
    {
        question: "La región de la Tierra donde existe vida y donde funcionan los ecosistemas se denomina:",
        options: ["Litosfera", "Hidrosfera", "Biosfera", "Estratosfera", "Geosfera"],
        correct: 2,
        justification: "La biosfera incluye todos los ambientes de la Tierra donde existe vida: agua, suelo y aire hasta cierta altitud."
    },
    {
        question: "En un cruce monohíbrido entre dos individuos heterocigotos (Aa × Aa), la proporción genotípica esperada en F2 será:",
        options: ["1 AA : 2 Aa : 1 aa", "3 AA : 1 aa", "1 AA : 1 aa", "2 AA : 1 aa", "1 Aa : 3 aa"],
        correct: 0,
        justification: "El cuadro de Punnett del cruce Aa × Aa produce: 1 AA : 2 Aa : 1 aa. Esta es la proporción genotípica 1:2:1."
    },
    {
        question: "Si un individuo presenta genotipo AA y expresa el carácter dominante, se afirma que su condición genética es:",
        options: ["Homocigoto dominante", "Homocigoto recesivo", "Heterocigoto", "Haploide", "Diploide"],
        correct: 0,
        justification: "AA indica dos alelos dominantes iguales, por lo tanto el individuo es homocigoto dominante."
    },
    {
        question: "En un cruce entre un individuo heterocigoto y uno homocigoto recesivo (Aa × aa), la proporción fenotípica esperada será:",
        options: ["3 : 1", "1 : 1", "1 : 2 : 1", "2 : 1", "4 : 0"],
        correct: 1,
        justification: "El cruce Aa × aa produce 50% Aa (fenotipo dominante) y 50% aa (fenotipo recesivo), por tanto proporción fenotípica 1:1."
    }
];

let currentQuestion = 0;
let score = 0;
let answered = false;
const userAnswers = [];

function initQuiz() { renderQuestion(); updateProgress(); updateButtons(); }

function renderQuestion() {
    const q = questions[currentQuestion];
    const container = document.getElementById('quizContainer');
    const letters = ['A', 'B', 'C', 'D', 'E'];
    container.innerHTML = `
        <div class="question-card active">
            <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
            <div class="question-text">${q.question}</div>
            <div class="options">
                ${q.options.map((option, index) => `
                    <div class="option" onclick="selectOption(${index})" data-index="${index}">
                        <span class="option-letter">${letters[index]}</span>
                        <span>${option}</span>
                    </div>
                `).join('')}
            </div>
            <div class="justification" id="justification">
                <strong>🧬 Justificación:</strong> ${q.justification}
            </div>
        </div>
    `;
    if (userAnswers[currentQuestion] !== undefined) showPreviousAnswer();
}

function selectOption(index) {
    if (answered) return;
    const options = document.querySelectorAll('.option');
    options.forEach(opt => opt.classList.remove('selected'));
    options[index].classList.add('selected');
    answered = true;
    userAnswers[currentQuestion] = index;
    const q = questions[currentQuestion];
    setTimeout(() => {
        if (index === q.correct) { options[index].classList.add('correct'); score++; }
        else { options[index].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
        options.forEach(opt => opt.classList.add('disabled'));
        document.getElementById('justification').classList.add('show');
        updateButtons();
    }, 300);
}

function showPreviousAnswer() {
    const options = document.querySelectorAll('.option');
    const userAnswer = userAnswers[currentQuestion];
    const q = questions[currentQuestion];
    options[userAnswer].classList.add('selected');
    if (userAnswer === q.correct) options[userAnswer].classList.add('correct');
    else { options[userAnswer].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
    options.forEach(opt => opt.classList.add('disabled'));
    document.getElementById('justification').classList.add('show');
    answered = true;
}

function nextQuestion() {
    if (!answered && userAnswers[currentQuestion] === undefined) {
        alert('Por favor, selecciona una respuesta antes de continuar.');
        return;
    }
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        answered = userAnswers[currentQuestion] !== undefined;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    } else { showResults(); }
}

function previousQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        answered = true;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    }
}

function updateButtons() {
    document.getElementById('prevBtn').disabled = currentQuestion === 0;
    document.getElementById('nextBtn').textContent = (currentQuestion === questions.length - 1)
        ? (answered ? 'Ver Resultados 🎯' : 'Finalizar 🎯')
        : 'Siguiente →';
}

function updateProgress() {
    const pct = Math.round(((currentQuestion + 1) / questions.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
    document.getElementById('progressPct').textContent = pct + '%';
}

function showResults() {
    document.getElementById('quizContainer').style.display = 'none';
    document.getElementById('navButtons').style.display = 'none';
    document.getElementById('results').classList.add('show');
    const total = questions.length;
    const nota = Math.round((score / total) * 20);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('totalQuestions').textContent = total;
    document.getElementById('finalNota').textContent = nota;
    setTimeout(() => {
        document.getElementById('gradeBarFill').style.width = ((nota / 20) * 100) + '%';
    }, 200);
    const badge = document.getElementById('gradeBadge');
    const msg = document.getElementById('resultMessage');
    if (nota >= 17) {
        badge.textContent = '🏆 Sobresaliente'; badge.className = 'grade-badge badge-excelente';
        msg.textContent = '¡Excelente desempeño! Dominas con solidez los temas de Biología. ¡Así se llega a la universidad! 🌟';
    } else if (nota >= 14) {
        badge.textContent = '👏 Aprobado — Bueno'; badge.className = 'grade-badge badge-bueno';
        msg.textContent = '¡Muy bien! Tienes buenos conocimientos en Biología. Refuerza los temas donde fallaste y estarás listo para el examen de admisión. 📚';
    } else if (nota >= 11) {
        badge.textContent = '📖 Aprobado — Regular'; badge.className = 'grade-badge badge-regular';
        msg.textContent = 'Vas por buen camino, pero aún hay temas que necesitan más repaso. ¡Tú puedes mejorar, sigue adelante! ✏️';
    } else {
        badge.textContent = '💪 Desaprobado — Sigue intentando'; badge.className = 'grade-badge badge-desaprobado';
        msg.textContent = 'No te rindas. Cada error es una lección. Repasa los temas con calma, vuelve a intentarlo y verás cómo mejoras. ¡Ánimo! 🔥';
    }
}

function restartQuiz() {
    currentQuestion = 0; score = 0; answered = false; userAnswers.length = 0;
    document.getElementById('gradeBarFill').style.width = '0%';
    document.getElementById('quizContainer').style.display = 'block';
    document.getElementById('navButtons').style.display = 'flex';
    document.getElementById('results').classList.remove('show');
    initQuiz();
}

initQuiz();
</script>
